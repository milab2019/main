<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔧 로봇 빌더즈 2045 — 교사용 결과 대시보드</title>
<style>
  :root {
    --bg: #0a0e1a;
    --bg2: #0d1428;
    --card: #111827;
    --card2: #1a2440;
    --accent: #00e5ff;
    --accent2: #7c3aed;
    --accent3: #10b981;
    --warn: #f59e0b;
    --danger: #ef4444;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --border: #1e3a5f;
    --glow: 0 0 20px rgba(0,229,255,0.3);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    min-height: 100vh;
  }

  /* ── STARS ── */
  .stars { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden; }
  .star { position:absolute; width:2px; height:2px; background:#fff; border-radius:50%; animation: twinkle 3s infinite alternate; }
  @keyframes twinkle { 0%{opacity:.1} 100%{opacity:.7} }

  /* ── HEADER ── */
  header {
    position: relative; z-index: 10;
    background: linear-gradient(135deg, #0d1428 0%, #111827 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }
  .logo-area { display: flex; align-items: center; gap: 12px; }
  .logo-badge {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; font-size: 11px; font-weight: 800;
    padding: 4px 10px; border-radius: 20px; letter-spacing: 1px;
  }
  .header-title { font-size: 18px; font-weight: 700; color: var(--text); }
  .header-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .teacher-badge {
    background: var(--card2); border: 1px solid var(--accent);
    color: var(--accent); font-size: 12px; font-weight: 600;
    padding: 6px 14px; border-radius: 20px;
  }

  /* ── MAIN ── */
  main {
    position: relative; z-index: 10;
    max-width: 960px; margin: 0 auto;
    padding: 32px 20px 60px;
  }

  /* ── SEARCH CARD ── */
  .search-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 28px;
    box-shadow: var(--glow);
  }
  .search-card h2 {
    font-size: 16px; font-weight: 700; color: var(--accent);
    margin-bottom: 6px;
  }
  .search-card p { font-size: 13px; color: var(--text2); margin-bottom: 18px; }
  .search-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .search-input {
    flex: 1; min-width: 200px;
    background: var(--card2); border: 2px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-size: 15px; padding: 12px 16px; outline: none;
    transition: border-color .2s;
  }
  .search-input:focus { border-color: var(--accent); box-shadow: var(--glow); }
  .btn {
    padding: 12px 24px; border-radius: 10px; border: none;
    font-size: 14px; font-weight: 700; cursor: pointer;
    transition: all .2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #0099bb);
    color: #0a0e1a;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: var(--glow); }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; }
  .btn-csv {
    background: var(--card2); border: 1px solid var(--accent3);
    color: var(--accent3);
  }
  .btn-csv:hover { background: var(--accent3); color: #0a0e1a; }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px 20px;
    text-align: center;
  }
  .stat-card .stat-val {
    font-size: 28px; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .stat-card .stat-label { font-size: 12px; color: var(--text2); margin-top: 4px; }

  /* ── TABLE ── */
  .table-wrap {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
  }
  .table-header {
    padding: 18px 24px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .table-header h3 { font-size: 15px; font-weight: 700; }
  .table-header span { font-size: 12px; color: var(--text2); }
  table { width: 100%; border-collapse: collapse; }
  th {
    background: var(--card2); color: var(--text2);
    font-size: 12px; font-weight: 600; letter-spacing: .5px;
    padding: 12px 16px; text-align: left;
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 13px 16px; font-size: 14px;
    border-bottom: 1px solid rgba(30,58,95,.4);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(0,229,255,.04); }

  .rank-badge {
    display: inline-block;
    padding: 3px 10px; border-radius: 20px;
    font-size: 12px; font-weight: 700;
  }
  .rank-s { background: rgba(251,191,36,.15); color: #fbbf24; border: 1px solid #fbbf24; }
  .rank-a { background: rgba(0,229,255,.12); color: var(--accent); border: 1px solid var(--accent); }
  .rank-b { background: rgba(16,185,129,.12); color: var(--accent3); border: 1px solid var(--accent3); }
  .rank-c { background: rgba(148,163,184,.12); color: var(--text2); border: 1px solid var(--text2); }

  .mission-scores { display: flex; gap: 6px; flex-wrap: wrap; }
  .ms-chip {
    background: var(--card2); border: 1px solid var(--border);
    border-radius: 6px; padding: 3px 8px;
    font-size: 11px; color: var(--text2);
  }
  .ms-chip span { color: var(--accent); font-weight: 700; }

  /* ── EMPTY / LOADING / ERROR ── */
  .state-box {
    text-align: center; padding: 60px 20px;
    color: var(--text2); font-size: 14px;
  }
  .state-box .icon { font-size: 48px; margin-bottom: 12px; }
  .state-box .msg { margin-bottom: 6px; font-size: 15px; color: var(--text); }
  .spinner {
    width: 36px; height: 36px; border: 3px solid var(--border);
    border-top-color: var(--accent); border-radius: 50%;
    animation: spin .8s linear infinite; margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── COMPLETED TIME ── */
  .time-text { font-size: 12px; color: var(--text2); }

  /* ── ENDING TAG ── */
  .ending-tag {
    font-size: 11px; color: var(--text2);
    background: var(--card2); border: 1px solid var(--border);
    padding: 3px 8px; border-radius: 6px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 120px; display: inline-block;
  }

  /* ── FOOTER NOTE ── */
  .note {
    margin-top: 20px; text-align: center;
    font-size: 12px; color: var(--text2);
  }

  @media (max-width: 600px) {
    th:nth-child(5), td:nth-child(5),
    th:nth-child(6), td:nth-child(6) { display: none; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<!-- STARS -->
<div class="stars" id="stars"></div>

<!-- HEADER -->
<header>
  <div class="logo-area">
    <div class="logo-badge">MILAB · #035</div>
    <div>
      <div class="header-title">🔧 로봇 빌더즈 2045</div>
      <div class="header-sub">교사용 결과 대시보드</div>
    </div>
  </div>
  <div class="teacher-badge">👩‍🏫 TEACHER</div>
</header>

<main>

  <!-- SEARCH -->
  <div class="search-card">
    <h2>📋 수업코드로 결과 조회</h2>
    <p>학생들이 게임 시작 시 입력한 수업코드를 입력하세요. (예: R2045, 3-1반)</p>
    <div class="search-row">
      <input class="search-input" id="codeInput" type="text"
             placeholder="수업코드 입력 (예: R2045)"
             onkeydown="if(event.key==='Enter') doSearch()">
      <button class="btn btn-primary" id="searchBtn" onclick="doSearch()">🔍 조회</button>
      <button class="btn btn-csv" id="csvBtn" onclick="downloadCSV()" style="display:none">⬇ CSV 저장</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row" id="statsRow" style="display:none">
    <div class="stat-card">
      <div class="stat-val" id="st-count">—</div>
      <div class="stat-label">참여 학생 수</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="st-avg">—</div>
      <div class="stat-label">평균 점수</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="st-top">—</div>
      <div class="stat-label">최고 점수</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="st-s">—</div>
      <div class="stat-label">S등급 인원</div>
    </div>
  </div>

  <!-- TABLE -->
  <div class="table-wrap" id="tableWrap">
    <div class="state-box">
      <div class="icon">🤖</div>
      <div class="msg">수업코드를 입력하고 조회하세요</div>
      <div>학생들의 게임 결과가 여기에 표시됩니다</div>
    </div>
  </div>

  <p class="note">데이터는 Supabase에 실시간 저장됩니다 · 미랩(MILAB) 교사 전용</p>
</main>

<script>
// ════════════════════════════════════════════
//  SUPABASE 설정 (읽기 전용)
// ════════════════════════════════════════════
const SB_URL = 'https://hgchewdgaothzbkucqgr.supabase.co';
const SB_KEY = 'sb_publishable_uEHahK6LfQO0xAp3pTQp2g_pvrcSUTW';

let currentData = [];   // 조회된 결과 캐시
let currentCode = '';

// ── 별 생성
(function(){
  const wrap = document.getElementById('stars');
  for(let i=0;i<60;i++){
    const s = document.createElement('div');
    s.className = 'star';
    s.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;
      width:${Math.random()*2+1}px;height:${Math.random()*2+1}px;
      animation-delay:${Math.random()*3}s;animation-duration:${2+Math.random()*3}s`;
    wrap.appendChild(s);
  }
})();

// ── Supabase GET
async function sbGet(table, params='') {
  try {
    const res = await fetch(`${SB_URL}/rest/v1/${table}?${params}`, {
      headers: {
        'apikey': SB_KEY,
        'Authorization': `Bearer ${SB_KEY}`,
        'Accept': 'application/json'
      }
    });
    if (!res.ok) { console.warn('[SB GET 실패]', await res.text()); return []; }
    return await res.json();
  } catch(e) {
    console.warn('[SB 네트워크]', e.message);
    return [];
  }
}

// ── 조회 메인
async function doSearch() {
  const code = document.getElementById('codeInput').value.trim();
  if (!code) { alert('수업코드를 입력하세요.'); return; }

  currentCode = code;
  setLoading(true);

  // 1. sessions에서 class_code 일치 세션 ID 목록 조회
  const sessions = await sbGet('sessions', `class_code=eq.${encodeURIComponent(code)}&select=id,teacher_name,created_at`);

  if (!sessions.length) {
    setEmpty(`"${code}" 코드로 저장된 데이터가 없습니다.`, '학생들이 해당 수업코드로 게임을 완료했는지 확인하세요.');
    setLoading(false);
    return;
  }

  // 2. session_id 목록으로 student_results 조회
  const sessionIds = sessions.map(s => s.id);
  const idFilter = sessionIds.map(id => `session_id.eq.${id}`).join(',');
  const results = await sbGet('student_results',
    `or=(${idFilter})&select=id,session_id,student_name,total_score,mission_scores,ending_type,completed_at&order=total_score.desc`
  );

  setLoading(false);

  if (!results.length) {
    setEmpty(`"${code}" 수업에 참여한 학생이 있지만 완료 결과가 없습니다.`, '게임을 끝까지 완료한 학생이 없을 수 있습니다.');
    return;
  }

  // session → student_name 맵 (teacher_name 필드에 학생 이름 저장됨)
  const sessionMap = {};
  sessions.forEach(s => { sessionMap[s.id] = s.teacher_name; });

  currentData = results.map(r => ({
    ...r,
    session_name: sessionMap[r.session_id] || r.student_name || '—'
  }));

  renderStats(currentData);
  renderTable(currentData, code);
  document.getElementById('csvBtn').style.display = 'inline-block';
}

// ── 통계 렌더
function renderStats(data) {
  const scores = data.map(d => d.total_score || 0);
  const avg = scores.length ? Math.round(scores.reduce((a,b)=>a+b,0)/scores.length) : 0;
  const top = scores.length ? Math.max(...scores) : 0;
  const sCount = data.filter(d => getRank(d.ending_type) === 'S').length;

  document.getElementById('st-count').textContent = data.length + '명';
  document.getElementById('st-avg').textContent = avg + '점';
  document.getElementById('st-top').textContent = top + '점';
  document.getElementById('st-s').textContent = sCount + '명';
  document.getElementById('statsRow').style.display = 'grid';
}

// ── 테이블 렌더
function renderTable(data, code) {
  const wrap = document.getElementById('tableWrap');
  const rows = data.map((r, i) => {
    const ms = r.mission_scores || {};
    const rank = getRank(r.ending_type);
    const rankClass = { S:'rank-s', A:'rank-a', B:'rank-b', C:'rank-c' }[rank] || 'rank-c';
    const completed = r.completed_at ? formatDate(r.completed_at) : '—';
    const name = r.student_name || r.session_name || '—';

    return `<tr>
      <td style="font-weight:700;color:var(--accent)">${i+1}</td>
      <td style="font-weight:600">${esc(name)}</td>
      <td style="font-size:16px;font-weight:800;color:var(--text)">${r.total_score ?? '—'}점</td>
      <td><span class="rank-badge ${rankClass}">${rank}등급</span></td>
      <td>
        <div class="mission-scores">
          <div class="ms-chip">M1 <span>${ms.m1 ?? '—'}</span></div>
          <div class="ms-chip">M2 <span>${ms.m2 ?? '—'}</span></div>
          <div class="ms-chip">M3 <span>${ms.m3 ?? '—'}</span></div>
          <div class="ms-chip">M4 <span>${ms.m4 ?? '—'}</span></div>
        </div>
      </td>
      <td><span class="ending-tag" title="${esc(r.ending_type||'')}">${esc(r.ending_type || '—')}</span></td>
      <td class="time-text">${completed}</td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `
    <div class="table-header">
      <h3>📊 수업코드: <span style="color:var(--accent)">${esc(code)}</span> 결과</h3>
      <span>총 ${data.length}명 완료</span>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>학생 이름</th>
            <th>총점</th>
            <th>등급</th>
            <th>미션별 점수</th>
            <th>직업 결과</th>
            <th>완료 시각</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ── 등급 판별 (ending_type 문자열 기반)
function getRank(endingType) {
  if (!endingType) return 'C';
  if (endingType.includes('설계자') || endingType.includes('S')) return 'S';
  if (endingType.includes('프로그래머') || endingType.includes('A')) return 'A';
  if (endingType.includes('검증') || endingType.includes('B')) return 'B';
  return 'C';
}

// ── CSV 다운로드
function downloadCSV() {
  if (!currentData.length) return;
  const headers = ['순위','이름','총점','등급','M1','M2','M3','M4','직업결과','완료시각'];
  const rows = currentData.map((r, i) => {
    const ms = r.mission_scores || {};
    const rank = getRank(r.ending_type);
    const name = r.student_name || r.session_name || '';
    return [
      i+1, name, r.total_score ?? '', rank,
      ms.m1 ?? '', ms.m2 ?? '', ms.m3 ?? '', ms.m4 ?? '',
      r.ending_type || '', r.completed_at ? formatDate(r.completed_at) : ''
    ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(',');
  });
  const csv = '\uFEFF' + [headers.join(','), ...rows].join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `milab_035_${currentCode}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(url);
}

// ── 유틸
function setLoading(on) {
  const btn = document.getElementById('searchBtn');
  btn.disabled = on;
  btn.textContent = on ? '⏳ 조회 중...' : '🔍 조회';
  if (on) {
    document.getElementById('tableWrap').innerHTML = `
      <div class="state-box">
        <div class="spinner"></div>
        <div class="msg">데이터를 불러오는 중입니다...</div>
      </div>`;
    document.getElementById('statsRow').style.display = 'none';
    document.getElementById('csvBtn').style.display = 'none';
  }
}

function setEmpty(msg, sub) {
  document.getElementById('tableWrap').innerHTML = `
    <div class="state-box">
      <div class="icon">🔍</div>
      <div class="msg">${esc(msg)}</div>
      <div>${esc(sub)}</div>
    </div>`;
  document.getElementById('statsRow').style.display = 'none';
  document.getElementById('csvBtn').style.display = 'none';
}

function formatDate(iso) {
  const d = new Date(iso);
  const pad = n => String(n).padStart(2,'0');
  return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function esc(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
