<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>🌿 신재생에너지 개발자 | MILAB #049</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
:root{
  --bg:#071520;--bg2:#0b1f30;--panel:#0e2640;--panel2:#122d4e;
  --green:#00e5a0;--green2:#00b87a;--blue:#00cfff;--yellow:#ffd600;
  --orange:#ff7043;--red:#ff4757;--text:#e0f4f8;--muted:#6a9ab8;
  --border:rgba(0,229,160,0.18);--glow:0 0 18px rgba(0,229,160,0.35);
  --safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{height:-webkit-fill-available;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;
  min-height:100vh;min-height:-webkit-fill-available;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
#app{position:relative;z-index:1;}
.screen{display:none;min-height:100vh;min-height:-webkit-fill-available;}
.screen.active{display:flex;flex-direction:column;}

/* ─── 타이틀 ─── */
#screen-title{
  align-items:center;justify-content:flex-start;
  padding:calc(20px + var(--safe-t)) 16px calc(24px + var(--safe-b));
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  background:radial-gradient(ellipse at 50% 28%,#0d2e50 0%,#071520 70%);
  text-align:center;
}
.title-badge{display:inline-block;background:linear-gradient(135deg,var(--green),var(--blue));
  color:#071520;font-family:'Orbitron',sans-serif;font-size:.62rem;font-weight:700;
  padding:4px 14px;border-radius:20px;letter-spacing:2px;margin-bottom:12px;}
.mascot-wrap{width:100px;height:100px;margin:0 auto 14px;position:relative;}
.mascot-aura{position:absolute;inset:-10px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,229,160,.18) 0%,transparent 70%);
  animation:pulse 2.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.12);opacity:1}}
.title-main{font-family:'Orbitron',sans-serif;font-size:clamp(1.3rem,5vw,2.2rem);font-weight:900;
  background:linear-gradient(135deg,var(--green),var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1.2;margin-bottom:4px;}
.title-sub{font-size:.86rem;color:var(--muted);margin-bottom:18px;}
.setup-card{background:var(--panel);border:1.5px solid var(--border);border-radius:18px;
  padding:18px;width:100%;max-width:420px;margin-bottom:14px;text-align:left;}
.setup-lbl{font-size:.78rem;color:var(--muted);margin-bottom:5px;}
.nick-input{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;
  color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:1rem;
  padding:11px 14px;outline:none;-webkit-appearance:none;transition:border-color .2s;}
.nick-input:focus{border-color:var(--green);}
.diff-row{display:flex;gap:8px;margin-top:12px;}
.diff-btn{flex:1;padding:10px 4px;border-radius:10px;border:1.5px solid var(--border);
  background:var(--bg2);color:var(--muted);font-family:'Noto Sans KR',sans-serif;
  font-size:.76rem;cursor:pointer;text-align:center;line-height:1.5;transition:all .2s;}
.diff-btn.selected{border-color:var(--green);background:rgba(0,229,160,.12);color:var(--green);box-shadow:var(--glow);}
.diff-info{background:var(--bg2);border:1px solid var(--border);border-radius:10px;
  padding:9px 13px;margin-top:9px;font-size:.78rem;color:var(--muted);line-height:1.6;}
.diff-info strong{color:var(--text);}
.btn-start{width:100%;max-width:420px;background:linear-gradient(135deg,var(--green),var(--blue));
  color:#071520;font-family:'Orbitron',sans-serif;font-weight:700;font-size:.9rem;
  padding:15px;border:none;border-radius:14px;cursor:pointer;letter-spacing:1px;
  box-shadow:0 4px 22px rgba(0,229,160,.35);margin-bottom:8px;}
.btn-start:active{transform:scale(.97);}

/* ─── 게임 헤더 ─── */
#screen-game{justify-content:flex-start;align-items:stretch;}
.game-hdr{background:rgba(14,38,64,.95);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  border-bottom:1px solid var(--border);
  padding:calc(10px + var(--safe-t)) 15px 10px;
  display:grid;grid-template-columns:1fr auto auto auto;align-items:center;gap:10px;
  position:sticky;top:0;z-index:20;}
.game-badge{font-family:'Orbitron',sans-serif;font-size:.64rem;color:var(--green);letter-spacing:1px;}
.m-dots{display:flex;gap:5px;}
.dot{width:9px;height:9px;border-radius:50%;background:var(--panel2);border:1.5px solid var(--border);transition:all .3s;}
.dot.done{background:var(--green);border-color:var(--green);box-shadow:0 0 6px rgba(0,229,160,.6);}
.dot.active{background:var(--blue);border-color:var(--blue);animation:blink 1s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.score-badge{font-family:'Orbitron',sans-serif;font-size:.8rem;color:var(--yellow);white-space:nowrap;}
.timer-badge{font-family:'Orbitron',sans-serif;font-size:.8rem;color:var(--text);min-width:38px;text-align:right;}
.timer-badge.warn{color:var(--red);animation:blink-r .5s ease-in-out infinite;}
@keyframes blink-r{0%,100%{opacity:1}50%{opacity:.3}}
.mbody{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding:16px 14px calc(72px + var(--safe-b));max-width:680px;width:100%;margin:0 auto;}
.prog-wrap{background:var(--bg2);border-radius:4px;height:4px;margin-bottom:16px;overflow:hidden;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--blue));transition:width .6s ease;border-radius:4px;}
.m-head{text-align:center;margin-bottom:16px;}
.m-num{font-family:'Orbitron',sans-serif;font-size:.64rem;color:var(--green);letter-spacing:3px;margin-bottom:3px;}
.m-title{font-size:1.1rem;font-weight:700;margin-bottom:3px;}
.m-desc{font-size:.8rem;color:var(--muted);line-height:1.5;}
.card{background:var(--panel);border:1.5px solid var(--border);border-radius:16px;padding:15px;margin-bottom:13px;}
.music-fab{position:fixed;bottom:calc(16px + var(--safe-b));right:14px;z-index:30;
  background:var(--panel2);border:1px solid var(--border);color:var(--muted);
  border-radius:50%;width:40px;height:40px;font-size:.95rem;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  box-shadow:0 4px 14px rgba(0,0,0,.4);}

/* ─── 미션1 ─── */
.energy-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:12px;}
.energy-item{background:var(--bg2);border:2px solid var(--border);border-radius:11px;
  padding:9px 3px;text-align:center;cursor:pointer;user-select:none;-webkit-user-select:none;}
.ei-icon{font-size:1.5rem;line-height:1;}
.ei-name{font-size:.62rem;margin-top:3px;color:var(--muted);}
.energy-item.sel{border-color:var(--blue);outline:2px solid var(--blue);outline-offset:1px;}
.energy-item.sr{border-color:var(--green);background:rgba(0,229,160,.1);}
.energy-item.sr .ei-name{color:var(--green);}
.energy-item.sf{border-color:var(--orange);background:rgba(255,112,67,.1);}
.energy-item.sf .ei-name{color:var(--orange);}
.energy-item.ev-ok{border-color:var(--green);background:rgba(0,229,160,.18);animation:pop .3s;}
.energy-item.ev-ng{border-color:var(--red);background:rgba(255,71,87,.14);animation:shake .3s;}
@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.clf-btns{display:flex;gap:8px;}
.btn-renew,.btn-fossil{flex:1;padding:11px 6px;border-radius:10px;border:none;
  font-family:'Noto Sans KR',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;}
.btn-renew{background:linear-gradient(135deg,var(--green),var(--green2));color:#071520;}
.btn-fossil{background:linear-gradient(135deg,var(--orange),#bf360c);color:#fff;}
.btn-renew:active,.btn-fossil:active{transform:scale(.96);}
.cnt-row{display:flex;justify-content:space-between;align-items:center;margin:9px 0 11px;font-size:.75rem;color:var(--muted);}
.btn-submit{width:100%;padding:13px;border-radius:12px;border:none;
  background:linear-gradient(135deg,var(--green),var(--blue));
  color:#071520;font-family:'Orbitron',sans-serif;font-weight:700;font-size:.82rem;
  cursor:pointer;letter-spacing:1px;box-shadow:0 3px 14px rgba(0,229,160,.3);}
.btn-submit:disabled{opacity:.38;pointer-events:none;}
.btn-submit:active{transform:scale(.97);}

/* ─── 미션2 ─── */
.diff-tabs{display:flex;gap:5px;margin-bottom:13px;}
.diff-tab{flex:1;min-width:68px;padding:8px 3px;border-radius:8px;border:1.5px solid var(--border);
  background:var(--bg2);color:var(--muted);font-size:.72rem;cursor:pointer;text-align:center;
  white-space:nowrap;font-family:'Noto Sans KR',sans-serif;}
.diff-tab.active{border-color:var(--blue);background:rgba(0,207,255,.1);color:var(--blue);}
.diff-tab.tab-done{border-color:var(--green);color:var(--green2);}
.qcount-badge{display:inline-block;background:rgba(0,207,255,.14);border:1px solid rgba(0,207,255,.3);
  border-radius:20px;padding:2px 10px;font-size:.7rem;color:var(--blue);margin-bottom:9px;}
.quiz-q{font-size:.89rem;font-weight:500;line-height:1.6;padding:11px 13px;
  background:var(--bg2);border-radius:10px;border-left:3px solid var(--blue);margin-bottom:9px;}
.q-num{font-family:'Orbitron',sans-serif;font-size:.62rem;color:var(--blue);margin-bottom:3px;}
.data-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:9px 12px;margin-bottom:9px;font-size:.76rem;color:var(--muted);line-height:1.7;white-space:pre-line;}
.quiz-opts{display:flex;flex-direction:column;gap:6px;margin-bottom:9px;}
.quiz-opt{background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;
  padding:11px 13px;cursor:pointer;font-size:.84rem;text-align:left;color:var(--text);
  font-family:'Noto Sans KR',sans-serif;line-height:1.4;-webkit-appearance:none;}
.quiz-opt:active{background:rgba(0,207,255,.06);}
.quiz-opt.opt-ok{border-color:var(--green);background:rgba(0,229,160,.11);color:var(--green);}
.quiz-opt.opt-ng{border-color:var(--red);background:rgba(255,71,87,.08);color:var(--red);}
.quiz-opt:disabled{pointer-events:none;}
.hint-row{display:flex;align-items:flex-start;gap:8px;flex-wrap:wrap;margin-bottom:7px;}
.hint-btn{background:none;border:1px dashed var(--yellow);color:var(--yellow);border-radius:8px;
  padding:5px 11px;font-size:.73rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.hint-btn:disabled{opacity:.35;pointer-events:none;}
.hint-txt{font-size:.75rem;color:var(--yellow);line-height:1.5;display:none;}
.fb{border-radius:10px;padding:9px 13px;font-size:.8rem;line-height:1.6;margin-top:7px;display:none;}
.fb-ok{background:rgba(0,229,160,.09);border:1px solid rgba(0,229,160,.3);color:var(--green);}
.fb-ng{background:rgba(255,71,87,.07);border:1px solid rgba(255,71,87,.25);color:#ff8a96;}
.q-prog{display:flex;gap:4px;}
.q-dot{width:7px;height:7px;border-radius:50%;background:var(--bg2);border:1px solid var(--border);}
.q-dot.done{background:var(--green);border-color:var(--green);}
.q-dot.cur{background:var(--blue);border-color:var(--blue);}

/* ─── 공통 버튼 ─── */
.btn-next{background:linear-gradient(135deg,var(--green),var(--blue));color:#071520;
  font-family:'Orbitron',sans-serif;font-weight:700;font-size:.78rem;
  padding:11px 22px;border:none;border-radius:10px;cursor:pointer;letter-spacing:.5px;}
.btn-next:active{transform:scale(.96);}
.btn-sec{background:transparent;color:var(--muted);border:1.5px solid var(--border);
  border-radius:10px;font-family:'Noto Sans KR',sans-serif;font-size:.8rem;padding:10px 18px;cursor:pointer;}

/* ─── 미션3 ─── */
.ai-sc{background:var(--bg2);border-radius:12px;padding:13px;border-left:3px solid var(--orange);margin-bottom:9px;}
.ai-tag{font-size:.68rem;color:var(--orange);font-weight:700;letter-spacing:1px;margin-bottom:5px;}
.ai-txt{font-size:.84rem;line-height:1.6;}
.ai-choices{display:flex;flex-direction:column;gap:6px;margin-top:9px;}
.ai-choice{background:var(--panel2);border:1.5px solid var(--border);border-radius:9px;
  padding:10px 12px;cursor:pointer;font-size:.82rem;text-align:left;color:var(--text);
  font-family:'Noto Sans KR',sans-serif;line-height:1.4;}
.ai-choice:active{background:rgba(255,112,67,.07);}
.ai-choice.ac-ok{border-color:var(--green);background:rgba(0,229,160,.11);color:var(--green);}
.ai-choice.ac-ng{border-color:var(--red);background:rgba(255,71,87,.08);color:var(--red);}
.ai-choice:disabled{pointer-events:none;}
.ethics-notice{background:rgba(255,214,0,.07);border:1px solid rgba(255,214,0,.25);
  border-radius:8px;padding:7px 12px;font-size:.73rem;color:var(--yellow);margin-bottom:11px;}

/* ─── 미션4 ─── */
.chart-box{background:var(--bg2);border-radius:12px;padding:13px;border:1px solid var(--border);margin-bottom:11px;}
.chart-lbl{font-size:.75rem;color:var(--muted);margin-bottom:9px;font-weight:500;}
.chart-src{font-size:.65rem;color:rgba(106,154,184,.5);text-align:right;margin-top:4px;}
.bar-chart{display:flex;align-items:flex-end;gap:5px;height:100px;}
.bar-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end;}
.bar-lbl{font-size:.58rem;color:var(--muted);text-align:center;}
.bar-vt{font-size:.64rem;color:var(--text);font-weight:600;}
.bar-fill{width:100%;border-radius:4px 4px 0 0;transition:height .8s cubic-bezier(.34,1.56,.64,1);min-height:3px;}
.line-svg{width:100%;height:100px;overflow:visible;}
.alt-choices{display:flex;flex-direction:column;gap:7px;}
.alt-choice{background:var(--panel2);border:1.5px solid var(--border);border-radius:10px;
  padding:11px 13px;cursor:pointer;font-size:.82rem;text-align:left;color:var(--text);
  font-family:'Noto Sans KR',sans-serif;line-height:1.4;}
.alt-choice:active{background:rgba(0,229,160,.07);}
.alt-choice.chosen{border-color:var(--blue);background:rgba(0,207,255,.09);color:var(--blue);}
.alt-choice:disabled{pointer-events:none;}

/* ─── 마스코트 플로팅 ─── */
#mascot-float{position:fixed;bottom:calc(64px + var(--safe-b));right:13px;
  width:64px;z-index:25;display:none;cursor:pointer;
  animation:pop-in .35s cubic-bezier(.34,1.56,.64,1);}
@keyframes pop-in{0%{transform:scale(0) translateY(20px);opacity:0}100%{transform:scale(1) translateY(0);opacity:1}}

/* ─── 결과 화면 ─── */
#screen-result{align-items:center;justify-content:flex-start;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:calc(24px + var(--safe-t)) 15px calc(24px + var(--safe-b));
  background:radial-gradient(ellipse at 50% 25%,#0d2e50 0%,#071520 70%);
  text-align:center;}
.res-emoji{font-size:3rem;margin-bottom:5px;}
.res-rank{font-family:'Orbitron',sans-serif;font-size:.64rem;color:var(--muted);letter-spacing:3px;margin-bottom:3px;}
.res-title{font-size:1.3rem;font-weight:700;margin-bottom:2px;}
.res-score{font-family:'Orbitron',sans-serif;font-size:2.4rem;font-weight:900;
  color:var(--green);text-shadow:0 0 20px rgba(0,229,160,.5);margin-bottom:5px;}
.res-desc{font-size:.82rem;color:var(--muted);max-width:300px;line-height:1.6;margin:0 auto 16px;}
.career-sec{background:var(--panel);border:1.5px solid var(--border);border-radius:16px;
  padding:15px 16px;width:100%;max-width:420px;margin-bottom:13px;text-align:left;}
.career-sec-ttl{font-size:.72rem;color:var(--green);letter-spacing:1px;font-weight:700;margin-bottom:11px;}
.career-card{background:var(--bg2);border-radius:12px;padding:11px 13px;margin-bottom:7px;border-left:3px solid var(--green);}
.career-card:last-child{margin-bottom:0;}
.career-name{font-weight:700;font-size:.88rem;color:var(--text);margin-bottom:2px;}
.career-dept{font-size:.72rem;color:var(--muted);margin-bottom:5px;}
.career-sal{display:inline-flex;align-items:center;gap:4px;background:rgba(255,214,0,.1);
  border:1px solid rgba(255,214,0,.25);border-radius:20px;padding:2px 9px;
  font-size:.72rem;color:var(--yellow);font-weight:600;}
.career-dsc{font-size:.73rem;color:var(--muted);margin-top:5px;line-height:1.5;}
.lb-sec{background:var(--panel);border:1.5px solid var(--border);border-radius:16px;
  padding:15px 16px;width:100%;max-width:420px;margin-bottom:13px;text-align:left;}
.lb-ttl{font-family:'Orbitron',sans-serif;font-size:.65rem;color:var(--yellow);letter-spacing:2px;margin-bottom:9px;}
.lb-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:.81rem;}
.lb-row:last-child{border-bottom:none;}
.lb-rank{font-family:'Orbitron',sans-serif;font-size:.68rem;color:var(--yellow);min-width:20px;}
.lb-name{flex:1;color:var(--text);}
.lb-pts{color:var(--green);font-weight:700;font-family:'Orbitron',sans-serif;font-size:.73rem;}
.lb-me{background:rgba(0,229,160,.07);border-radius:6px;padding:4px 6px;}
.qr-sec{margin-bottom:16px;}
.qr-lbl{font-size:.68rem;color:var(--muted);margin-top:5px;}
.res-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;width:100%;max-width:420px;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--panel2);border-radius:2px;}
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div id="app">

<!-- 타이틀 -->
<div id="screen-title" class="screen active">
  <div class="title-badge">MILAB #049 · 중학교 공통</div>
  <div class="mascot-wrap">
    <div class="mascot-aura"></div>
    <svg viewBox="0 0 110 110" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
      <ellipse cx="55" cy="74" rx="26" ry="18" fill="#0e2640" stroke="#00e5a0" stroke-width="1.5"/>
      <circle cx="55" cy="44" r="22" fill="#122d4e" stroke="#00e5a0" stroke-width="1.5"/>
      <ellipse cx="46" cy="42" rx="4.5" ry="5.5" fill="#00e5a0" opacity=".9"/>
      <ellipse cx="64" cy="42" rx="4.5" ry="5.5" fill="#00e5a0" opacity=".9"/>
      <circle cx="47" cy="43" r="2.2" fill="#071520"/>
      <circle cx="65" cy="43" r="2.2" fill="#071520"/>
      <circle cx="48" cy="42" r=".9" fill="white"/>
      <circle cx="66" cy="42" r=".9" fill="white"/>
      <path d="M48 53 Q55 59 62 53" stroke="#00e5a0" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <path d="M35 40 Q37 24 55 22 Q73 24 75 40" stroke="#00cfff" stroke-width="1.5" fill="rgba(0,207,255,.07)" stroke-dasharray="3,2"/>
      <line x1="55" y1="22" x2="55" y2="12" stroke="#00e5a0" stroke-width="1.5"/>
      <circle cx="55" cy="10" r="2.5" fill="#00e5a0"><animate attributeName="opacity" values="1;.3;1" dur="1.5s" repeatCount="indefinite"/></circle>
      <rect x="22" y="67" width="16" height="11" rx="2" fill="#0d1f3c" stroke="#00cfff" stroke-width=".9"/>
      <line x1="30" y1="67" x2="30" y2="78" stroke="#00cfff" stroke-width=".7" opacity=".6"/>
      <line x1="22" y1="72" x2="38" y2="72" stroke="#00cfff" stroke-width=".7" opacity=".6"/>
      <rect x="72" y="67" width="16" height="11" rx="2" fill="#0d1f3c" stroke="#00cfff" stroke-width=".9"/>

(function(){
  const cv=document.getElementById('bg-canvas'),cx=cv.getContext('2d');
  let W,H,ps=[];
  const r=()=>{W=cv.width=innerWidth;H=cv.height=innerHeight;};
  r();addEventListener('resize',r);
  for(let i=0;i<70;i++)ps.push({x:Math.random()*9999,y:Math.random()*9999,
    rr:Math.random()*1.2+.3,s:Math.random()*.25+.05,
    c:Math.random()<.5?'rgba(0,229,160,':'rgba(0,207,255,',o:Math.random()*.4+.1});
  function draw(){
    cx.clearRect(0,0,W,H);
    ps.forEach(p=>{p.y-=p.s;if(p.y<0){p.y=H;p.x=Math.random()*W;}
      cx.beginPath();cx.arc(p.x%W,p.y,p.rr,0,Math.PI*2);cx.fillStyle=p.c+p.o+')';cx.fill();});
    requestAnimationFrame(draw);
  }draw();
})();

function initAudio(){
  if(G.ctx)return;
  G.ctx=new(window.AudioContext||window.webkitAudioContext)();
  playAmb();
}
function playAmb(){
  if(!G.ctx||!G.musicOn)return;
  const N=[130.8,146.8,164.8,174.6,196,220];
  function n(){
    if(!G.musicOn||!G.ctx)return;
    const o=G.ctx.createOscillator(),g=G.ctx.createGain(),f=G.ctx.createBiquadFilter();
    f.type='lowpass';f.frequency.value=500;
    o.connect(f);f.connect(g);g.connect(G.ctx.destination);
    o.type='sine';o.frequency.value=N[Math.floor(Math.random()*N.length)];
    g.gain.setValueAtTime(0,G.ctx.currentTime);
    g.gain.linearRampToValueAtTime(.032,G.ctx.currentTime+.3);
    g.gain.linearRampToValueAtTime(0,G.ctx.currentTime+1.1);
    o.start();o.stop(G.ctx.currentTime+1.4);
    setTimeout(n,900+Math.random()*1100);
  }n();
}
function beep(f,d,t='sine',v=.12){
  if(!G.ctx)return;
  const o=G.ctx.createOscillator(),g=G.ctx.createGain();
  o.connect(g);g.connect(G.ctx.destination);
  o.type=t;o.frequency.value=f;
  g.gain.setValueAtTime(v,G.ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,G.ctx.currentTime+d);
  o.start();o.stop(G.ctx.currentTime+d+.05);
}
function sfxOK(){beep(880,.12);setTimeout(()=>beep(1100,.1),130);}
function sfxNG(){beep(180,.3,'sawtooth',.09);}
function sfxTap(){beep(440,.05,'square',.06);}

function answerQ(chosen){
  clearTimer();
  const lv=lname(G.m2Lv),q=G.m2Qs[lv][G.m2QIdx],cfg=DCFG[G.diff];
  G.m2Res[lv][G.m2QIdx]=chosen;

  opts.forEach((o,i)=>{o.disabled=true;if(i===q.ans)o.classList.add('opt-ok');else if(i===chosen)o.classList.add('opt-ng');});
  const isOk=chosen===q.ans;const pen=G._hint?2:0;const pts=isOk?Math.max(cfg.pts[G.m2Lv]-pen,1):0;
  if(isOk){sfxOK();addScore(pts);mascot('ok','👍정답!');}
  else if(chosen===-1){sfxNG();mascot('ng','⏰시간!');}
  else{sfxNG();mascot('ng','😅다시!');}
  const fb=document.getElementById('fbx');if(fb){fb.style.display='block';
    if(isOk){fb.className='fb fb-ok';fb.innerHTML=q.fb_ok+`<strong> (+${pts}점)</strong>`;}
    else{fb.className='fb fb-ng';fb.textContent=chosen===-1?'⏰ 시간 초과! '+q.fb_no:q.fb_no;}}
  G._hint=false;
  const card=document.querySelector('#qwrap .card');
  if(card&&!card.querySelector('.btn-next')){const nb=document.createElement('div');
    nb.style.cssText='text-align:center;margin-top:11px';
    nb.innerHTML=`<button class="btn-next" onclick="nextQ()">다음 문제 →</button>`;card.appendChild(nb);}
}

      <div class="m-desc">머신러닝·생성형 AI 원리를 직접 체험!</div>
    </div>
    <div class="ethics-notice">⚠️ AI 사용 윤리: AI 결과물은 데이터 품질과 검증에 달려 있습니다.</div>
    ${AI_SC.map((sc,si)=>`
      <div class="card" id="sc${si}">
        <div class="ai-sc"><div class="ai-tag">${sc.tag}</div><div class="ai-txt">${sc.txt}</div></div>
        <div class="ai-choices" id="ach${si}">
          ${sc.ch.map((c,ci)=>`<button class="ai-choice" onclick="ansAI(${si},${ci})">${['①','②','③','④'][ci]} ${c}</button>`).join('')}
        </div>
        <div class="fb" id="afb${si}"></div>
      </div>`).join('')}
    <div id="m3next" style="display:none;text-align:center;margin-top:4px">
      <button class="btn-next" onclick="goNextMission()">미션 4로 🌍</button></div>`;

  window.ansAI=function(si,ci){
    if(done[si])return;sfxTap();done[si]=true;
    const sc=AI_SC[si];
    document.querySelectorAll(`#ach${si} .ai-choice`).forEach((b,i)=>{
      b.disabled=true;if(i===sc.ans)b.classList.add('ac-ok');else if(i===ci)b.classList.add('ac-ng');});
    const fb=document.getElementById('afb'+si);
    if(ci===sc.ans){sfxOK();sc3+=10;fb.className='fb fb-ok';fb.style.display='block';fb.innerHTML=sc.fb+' <strong>(+10점)</strong>';mascot('ok','🤖정답!');}
    else{sfxNG();fb.className='fb fb-ng';fb.style.display='block';fb.textContent='🤔 '+sc.fb;mascot('ng','😅');}
    if(done.every(Boolean)&&!G.m3Done){G.m3Done=true;addScore(sc3);document.getElementById('m3next').style.display='block';}
  };
}

/* ═══ 미션4 ═══ */
function renderM4(){
  G.m4Done=false;
  const barD=[{l:'태양광',v:42,c:'#ffd600'},{l:'풍력',v:28,c:'#00cfff'},{l:'바이오',v:18,c:'#00e5a0'},{l:'수력',v:8,c:'#7c4dff'},{l:'기타',v:4,c:'#ff7043'}];
  const lY=[2019,2020,2021,2022,2023],lV=[6.1,7.2,7.9,8.5,9.2];
  const maxB=42,maxL=9.2;
  const bars=barD.map(d=>`<div class="bar-item"><div class="bar-vt">${d.v}%</div><div class="bar-fill" style="height:${Math.round((d.v/maxB)*88)}px;background:${d.c}"></div><div class="bar-lbl">${d.l}</div></div>`).join('');
  const sw=280,sh=90,pl=26,pb=16,pt=8,pr=6;const cw=sw-pl-pr,ch=sh-pb-pt;
  const pts=lV.map((v,i)=>[pl+(i/(lV.length-1))*cw,pt+(1-v/maxL)*ch]);
  const poly=pts.map(p=>p.join(',')).join(' ');
  const area='M'+pts[0].join(',')+'L'+pts.map(p=>p.join(',')).join('L')+`L${pts[pts.length-1][0]},${sh-pb}L${pts[0][0]},${sh-pb}Z`;
  const svg=`<svg class="line-svg" viewBox="0 0 ${sw} ${sh}" xmlns="http://www.w3.org/2000/svg">
    <defs><linearGradient id="lg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00e5a0" stop-opacity=".3"/><stop offset="100%" stop-color="#00e5a0" stop-opacity="0"/></linearGradient></defs>
    ${[0,50,100].map(p=>`<line x1="${pl}" y1="${pt+p/100*ch}" x2="${sw-pr}" y2="${pt+p/100*ch}" stroke="rgba(255,255,255,.06)" stroke-width="1"/>`).join('')}
    ${[0,5,9.2].map(v=>`<text x="${pl-3}" y="${pt+(1-v/maxL)*ch+3}" text-anchor="end" fill="#6a9ab8" font-size="7">${v}</text>`).join('')}
    ${lY.map((yr,i)=>`<text x="${pl+(i/(lY.length-1))*cw}" y="${sh-pb+10}" text-anchor="middle" fill="#6a9ab8" font-size="7">${yr}</text>`).join('')}
    <path d="${area}" fill="url(#lg)"/>
    <polyline points="${poly}" fill="none" stroke="#00e5a0" stroke-width="2" stroke-linejoin="round"/>
    ${pts.map((p,i)=>`<circle cx="${p[0]}" cy="${p[1]}" r="2.5" fill="#00e5a0"/><text x="${p[0]}" y="${p[1]-4}" text-anchor="middle" fill="#00e5a0" font-size="7">${lV[i]}</text>`).join('')}
  </svg>`;

  const b=document.getElementById('mbody');
  b.innerHTML=`
    <div class="prog-wrap"><div class="prog-fill" style="width:90%"></div></div>
    <div class="m-head"><div class="m-num">MISSION 04</div>
      <div class="m-title">🌍 데이터 분석 대시보드</div>
      <div class="m-desc">실제 데이터를 분석하고 최선의 정책을 도출하세요!</div>
    </div>
    <div class="chart-box"><div class="chart-lbl">📊 국내 재생에너지원별 비중 (2023)</div>
      <div class="bar-chart">${bars}</div>
      <div class="chart-src">출처: 한국에너지공단 신재생에너지 보급통계 (2023)</div>
    </div>
    <div class="chart-box"><div class="chart-lbl">📈 재생에너지 발전 비중 추이 (%)</div>
      ${svg}<div class="chart-src">출처: 산업통상자원부 에너지통계연보 (2019~2023)</div>
    </div>
    <div class="card">
      <div style="font-weight:600;font-size:.88rem;margin-bottom:8px">📋 2030년 재생에너지 확대를 위한 최선의 전략은?</div>
      <div class="data-box">● 태양광: 비중 42%, 기술 성숙 단계\n● 풍력: 성장 잠재력 높음, 해상풍력 주목\n● 연평균 증가: 약 0.8%p/년\n● OECD 평균 33% 대비 여전히 낮음</div>
      <div class="alt-choices" id="alts">
        <button class="alt-choice" onclick="altAns(this,0)">① 태양광 집중 투자 — 검증된 기술로 최우선 확대</button>
        <button class="alt-choice" onclick="altAns(this,1)">② 해상풍력 + 태양광 동시 확대 — 리스크 분산</button>
        <button class="alt-choice" onclick="altAns(this,2)">③ 화석연료 유지 — 안정적 전력 공급 우선</button>
        <button class="alt-choice" onclick="altAns(this,3)">④ 바이오매스 집중 — 비용 절감 우선</button>
      </div>
      <div class="fb" id="altfb"></div>
      <div id="m4next" style="display:none;text-align:center;margin-top:12px">
        <button class="btn-next" onclick="finishGame()">🏆 결과 확인!</button></div>
    </div>`;

  window.altAns=function(el,idx){
    if(G.m4Done)return;G.m4Done=true;sfxTap();
    document.querySelectorAll('.alt-choice').forEach(b=>b.disabled=true);el.classList.add('chosen');
    const msgs=[
      {ok:true,txt:'💡 좋은 선택! 태양광은 검증된 기술이에요. 날씨 의존도 보완 대책도 함께 고민해봐요. (+15점)'},
      {ok:true,txt:'🌟 최선의 선택! 태양광+풍력 조합으로 날씨 리스크 분산, OECD 목표에 가장 빠르게 도달! (+15점)'},
      {ok:false,txt:'🤔 화석연료는 탄소 배출로 기후위기를 가속해요. 데이터의 재생에너지 성장 추세를 다시 보세요.'},
      {ok:false,txt:'🤔 바이오매스도 가능하지만 현재 비중(18%)을 고려하면 주 전략으로는 부족해요.'},
    ];
    const m=msgs[idx];const fb=document.getElementById('altfb');
    fb.className='fb '+(m.ok?'fb-ok':'fb-ng');fb.style.display='block';fb.innerHTML=m.txt;
    if(m.ok){sfxOK();addScore(15);mascot('ok','🌍훌륭!');}else{sfxNG();mascot('ng','😅');}
    document.getElementById('m4next').style.display='block';
  };
}

/* ═══ 결과 ═══ */
function finishGame(){
  clearTimer();showScreen('screen-result');const s=G.score;
  const ends=[
    {min:80,emoji:'🏆',rank:'에너지 마스터',title:'신재생에너지 박사!',desc:'완벽한 데이터 분석과 AI 이해력! 미래 에너지 정책을 이끌 최고의 인재입니다.',tier:'high'},
    {min:60,emoji:'⚡',rank:'에너지 엔지니어',title:'탁월한 탐구자!',desc:'뛰어난 분석력! 조금 더 익히면 에너지 전문가로 성장할 수 있어요.',tier:'mid'},
    {min:40,emoji:'🌱',rank:'에너지 탐구자',title:'좋은 시작이에요!',desc:'기본 개념을 파악했어요. 데이터 분석 능력을 더 키워봐요!',tier:'low'},
    {min:0, emoji:'🌿',rank:'에너지 새싹',title:'첫 걸음을 내딛었어요!',desc:'신재생에너지는 우리의 미래! 다시 도전해봐요.',tier:'seed'},
  ];
  const e=ends.find(en=>s>=en.min)||ends[ends.length-1];
  document.getElementById('res-emoji').textContent=e.emoji;
  document.getElementById('res-rank').textContent=e.rank;
  document.getElementById('res-title').textContent=e.title;
  document.getElementById('res-score').textContent=s+'점';
  document.getElementById('res-desc').textContent=e.desc;

  // 진로 카드
  const cl=document.getElementById('career-list');
  cl.innerHTML=(CAREERS[e.tier]||CAREERS.seed).map(c=>`
    <div class="career-card">
      <div class="career-name">💼 ${c.name}</div>
      <div class="career-dept">🎓 ${c.dept}</div>
      <div><span class="career-sal">💰 ${c.sal}</span></div>
      <div class="career-dsc">${c.dsc}</div>
    </div>`).join('');

  // 리더보드
  const lb=JSON.parse(localStorage.getItem('m049lb')||'[]');
  lb.push({nick:G.nick,score:s});lb.sort((a,b)=>b.score-a.score);
  const top5=lb.slice(0,5);localStorage.setItem('m049lb',JSON.stringify(top5));
  document.getElementById('lb-list').innerHTML=top5.map((r,i)=>`
    <div class="lb-row${r.nick===G.nick?' lb-me':''}">
      <span class="lb-rank">${['🥇','🥈','🥉','4위','5위'][i]}</span>
      <span class="lb-name">${r.nick}</span>
      <span class="lb-pts">${r.score}pt</span>
    </div>`).join('')||'<div style="color:var(--muted);font-size:.8rem">기록이 없어요!</div>';

  // QR
  try{document.getElementById('qr-inner').innerHTML='';
    new QRCode(document.getElementById('qr-inner'),{text:'https://milab2019.github.io/main/milab_portfolio.html',width:90,height:90,colorDark:'#071520',colorLight:'#ffffff'});}catch(err){}

  console.log(JSON.stringify({id:'#049',title:'신재생에너지 개발자',target:'중학교 공통',grade:'중1~3',
    subjects:['과학','사회','정보','기술·가정'],aiFeature:'머신러닝 편향 체험+생성형AI 윤리 판단',
    theme:'신재생에너지 데이터 탐구+AI윤리+진로연계',date:'2026-05-01',
    url:'https://milab2019.github.io/main/milab_renewable_energy_049.html'},null,2));
}

function restartGame(){
  clearTimer();
  Object.assign(G,{score:0,mission:0,m1Answers:{},m1Sel:null,m1Done:false,m2Qs:{},m2Res:{easy:[],normal:[],hard:[]},m2Lv:0,m2QIdx:0,m3Done:false,m4Done:false,_hint:false});
  document.getElementById('score-disp').textContent='0';updDots();showScreen('screen-title');
}
function shareResult(){
  const txt=`🌿 MILAB #049 신재생에너지 개발자\n✨ ${G.nick} — ${G.score}점!\nhttps://milab2019.github.io/main/milab_renewable_049.html`;
  if(navigator.share)navigator.share({title:'MILAB #049',text:txt});
  else navigator.clipboard?.writeText(txt).then(()=>alert('결과가 복사됐어요!'));
}

/* ═══ 이벤트 바인딩 ═══ */
document.querySelectorAll('.diff-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('selected'));
    btn.classList.add('selected');G.diff=btn.dataset.d;
    document.getElementById('diff-info').innerHTML=DCFG[G.diff].desc;sfxTap();
  });
});
document.getElementById('start-btn').addEventListener('click',()=>{
  G.nick=document.getElementById('nick-input').value.trim()||'에너지탐구자';
  initAudio();showScreen('screen-game');G.mission=0;updDots();renderM1();
});
document.getElementById('nick-input').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('start-btn').click();});
document.getElementById('music-fab').addEventListener('click',()=>{
  G.musicOn=!G.musicOn;document.getElementById('music-fab').textContent=G.musicOn?'🎵':'🔇';
  if(G.musicOn)initAudio();sfxTap();
});
</script>
