<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Nanum Gothic', 'Apple SD Gothic Neo', sans-serif;
    background: linear-gradient(135deg, #E8F6FD 0%, #ffffff 40%, #FEF0EB 100%);
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 배경 장식 원 */
  .bg-circle1 {
    position: absolute;
    width: 420px; height: 420px;
    border-radius: 50%;
    background: radial-gradient(circle, #29ABE220 0%, transparent 70%);
    top: -80px; left: -80px;
  }
  .bg-circle2 {
    position: absolute;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: radial-gradient(circle, #F4845F18 0%, transparent 70%);
    bottom: -60px; right: 60px;
  }
  .bg-circle3 {
    position: absolute;
    width: 180px; height: 180px;
    border-radius: 50%;
    background: radial-gradient(circle, #29ABE215 0%, transparent 70%);
    bottom: 40px; left: 200px;
  }

  /* 왼쪽 파란 세로 바 */
  .left-bar {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 12px;
    background: linear-gradient(180deg, #29ABE2, #F4845F);
  }

  .container {
    display: flex;
    align-items: center;
    gap: 60px;
    padding: 0 80px;
    position: relative;
    z-index: 2;
    width: 100%;
  }

  .logo-section {
    flex-shrink: 0;
  }

  .logo-section img {
    width: 340px;
    height: auto;
  }

  .divider {
    width: 3px;
    height: 200px;
    background: linear-gradient(180deg, transparent, #29ABE2, #F4845F, transparent);
    flex-shrink: 0;
  }

  .text-section {
    flex: 1;
  }

  .badge {
    display: inline-block;
    background: linear-gradient(90deg, #29ABE2, #1890C4);
    color: white;
    font-size: 18px;
    font-weight: 700;
    padding: 6px 18px;
    border-radius: 20px;
    margin-bottom: 18px;
    letter-spacing: 0.5px;
  }

  .main-title {
    font-size: 46px;
    font-weight: 800;
    color: #1a3a4a;
    line-height: 1.2;
    margin-bottom: 14px;
    letter-spacing: -1px;
  }

  .main-title span {
    color: #29ABE2;
  }

  .sub-title {
    font-size: 22px;
    color: #F4845F;
    font-weight: 700;
    margin-bottom: 22px;
  }

  .tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tag {
    background: white;
    border: 1.5px solid #29ABE240;
    color: #1890C4;
    font-size: 15px;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 20px;
    box-shadow: 0 2px 6px rgba(41,171,226,0.08);
  }

  /* 우측 하단 앱 수 뱃지 */
  .app-count {
    position: absolute;
    bottom: 36px;
    right: 60px;
    background: linear-gradient(135deg, #F4845F, #e06a45);
    color: white;
    border-radius: 16px;
    padding: 14px 28px;
    text-align: center;
    box-shadow: 0 4px 16px rgba(244,132,95,0.3);
  }
  .app-count .num {
    font-size: 40px;
    font-weight: 800;
    line-height: 1;
  }
  .app-count .label {
    font-size: 14px;
    font-weight: 600;
    margin-top: 2px;
    opacity: 0.9;
  }

  /* 상단 URL */
  .url-bar {
    position: absolute;
    bottom: 50px;
    left: 80px;
    font-size: 15px;
    color: #29ABE2;
    font-weight: 600;
    opacity: 0.8;
  }
</style>
</head>
