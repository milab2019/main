<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>미랩 AR 퀴즈 탐험대 #047</title>

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<!-- AR.js -->
<script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<!-- QRCode.js v1.0.0 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
  :root {
    --sky: #20A0E0;
    --coral: #F09070;
    --navy: #0a1628;
    --navy2: #0d1f3c;
    --glow: rgba(32,160,224,0.35);
    --panel-bg: rgba(8,18,36,0.97);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--navy);
    color: #fff;
    font-family: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    overflow: hidden;
    height: 100vh;
    width: 100vw;
  }

  /* ── 별 배경 ── */
  #stars-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background: radial-gradient(ellipse at 20% 30%, #0d2a4a 0%, var(--navy) 70%);
    overflow: hidden;
  }
  .star {
    position: absolute; border-radius: 50%;
    background: #fff; opacity: 0;
    animation: twinkle var(--dur, 3s) var(--delay, 0s) infinite ease-in-out;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0; transform: scale(0.8); }
    50% { opacity: var(--op, 0.8); transform: scale(1.2); }
  }

  /* ── 시작 화면 ── */
  #start-screen {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 28px; padding: 32px 20px;
    background: linear-gradient(160deg, #0a1628 0%, #0d2040 50%, #0a1628 100%);
  }
  .milab-logo {
    font-size: 13px; font-weight: 700; letter-spacing: 4px;
    color: var(--sky); text-transform: uppercase;
    border: 1px solid rgba(32,160,224,0.4);
    padding: 6px 18px; border-radius: 20px;
    box-shadow: 0 0 20px var(--glow);
  }
  .app-num {
    position: absolute; top: 20px; right: 24px;
    font-size: 11px; color: rgba(255,255,255,0.3);
    letter-spacing: 2px;
  }
  .hero-icon {
    width: 120px; height: 120px;
    background: linear-gradient(135deg, var(--sky), #0060a0);
    border-radius: 30px;
    display: flex; align-items: center; justify-content: center;
    font-size: 56px;
    box-shadow: 0 0 60px rgba(32,160,224,0.5), 0 0 120px rgba(32,160,224,0.2);
    animation: heroFloat 3s ease-in-out infinite;
  }
  @keyframes heroFloat {
    0%,100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-12px) rotate(3deg); }
  }
  .app-title {
    font-size: 28px; font-weight: 900; text-align: center; line-height: 1.3;
    background: linear-gradient(135deg, #fff 0%, var(--sky) 50%, var(--coral) 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-shadow: none;
  }
  .app-sub {
    font-size: 14px; color: rgba(255,255,255,0.6); text-align: center; line-height: 1.8;
  }
  .marker-guide {
    background: rgba(32,160,224,0.1); border: 1px solid rgba(32,160,224,0.3);
    border-radius: 16px; padding: 18px 24px; width: 100%; max-width: 340px;
  }
  .marker-guide h3 {
    font-size: 13px; color: var(--sky); margin-bottom: 12px; letter-spacing: 1px;
  }
  .marker-row {
    display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
  }
  .marker-badge {
    width: 44px; height: 44px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .marker-badge.hiro { background: linear-gradient(135deg, var(--sky), #0080c0); }
  .marker-badge.kanji { background: linear-gradient(135deg, var(--coral), #d06040); }
  .marker-info { font-size: 13px; line-height: 1.5; }
  .marker-info strong { color: #fff; display: block; font-size: 14px; }
  .marker-info span { color: rgba(255,255,255,0.5); }

  .btn-start {
    width: 100%; max-width: 300px; padding: 18px;
    background: linear-gradient(135deg, var(--sky), #0070b0);
    border: none; border-radius: 16px;
    color: #fff; font-size: 18px; font-weight: 700;
    cursor: pointer; letter-spacing: 1px;
    box-shadow: 0 8px 32px rgba(32,160,224,0.4);
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .btn-start:active { transform: scale(0.97); }
  .grade-tag {
    font-size: 12px; color: rgba(255,255,255,0.4);
  }

  /* ── AR 화면 ── */
  #ar-screen {
    position: fixed; inset: 0; z-index: 50; display: none;
  }
  #ar-scene {
    width: 100%; height: 100%;
  }

  /* AR 오버레이 HUD */
  #ar-hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 200;
    padding: 16px 20px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(to bottom, rgba(8,18,36,0.9) 0%, transparent 100%);
    pointer-events: none;
  }
  .hud-title { font-size: 14px; font-weight: 700; color: var(--sky); }
  .hud-score { font-size: 13px; color: rgba(255,255,255,0.7); }
  .hud-back {
    position: fixed; top: 16px; right: 20px; z-index: 201;
    background: rgba(8,18,36,0.8); border: 1px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.7); padding: 8px 14px;
    border-radius: 20px; font-size: 13px; cursor: pointer;
    pointer-events: all;
  }

  /* 스캔 가이드 */
  #scan-guide {
    position: fixed; top: 50%; left: 50%; z-index: 201;
    transform: translate(-50%, -50%);
    text-align: center; pointer-events: none;
    transition: opacity 0.5s;
  }
  .scan-frame {
    width: 200px; height: 200px; margin: 0 auto 16px;
    border: 2px solid rgba(32,160,224,0.6);
    border-radius: 20px; position: relative;
    animation: scanPulse 2s ease-in-out infinite;
  }
  .scan-frame::before, .scan-frame::after {
    content: ''; position: absolute;
    width: 30px; height: 30px;
    border-color: var(--sky); border-style: solid;
  }
  .scan-frame::before { top: -2px; left: -2px; border-width: 3px 0 0 3px; border-radius: 8px 0 0 0; }
  .scan-frame::after { bottom: -2px; right: -2px; border-width: 0 3px 3px 0; border-radius: 0 0 8px 0; }
  @keyframes scanPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(32,160,224,0.4); }
    50% { box-shadow: 0 0 0 20px rgba(32,160,224,0); }
  }
  .scan-line {
    position: absolute; left: 10%; right: 10%; height: 2px;
    background: linear-gradient(to right, transparent, var(--sky), transparent);
    animation: scanMove 2s linear infinite;
  }
  @keyframes scanMove {
    0% { top: 10%; } 100% { top: 90%; }
  }
  #scan-guide p { font-size: 14px; color: rgba(255,255,255,0.8); }

  /* ── 퀴즈 패널 ── */
  #quiz-panel {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 300;
    background: var(--panel-bg);
    border-top: 1px solid rgba(32,160,224,0.3);
    border-radius: 24px 24px 0 0;
    padding: 20px 20px 32px;
    transform: translateY(100%);
    transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    max-height: 75vh; overflow-y: auto;
    backdrop-filter: blur(20px);
    box-shadow: 0 -20px 60px rgba(0,0,0,0.6);
  }
  #quiz-panel.visible { transform: translateY(0); }

  .panel-handle {
    width: 40px; height: 4px; background: rgba(255,255,255,0.2);
    border-radius: 2px; margin: 0 auto 16px;
  }
  .panel-marker-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700;
    margin-bottom: 16px;
  }
  .panel-marker-badge.hiro { background: rgba(32,160,224,0.2); color: var(--sky); border: 1px solid rgba(32,160,224,0.4); }
  .panel-marker-badge.kanji { background: rgba(240,144,112,0.2); color: var(--coral); border: 1px solid rgba(240,144,112,0.4); }

  /* 진행바 */
  .progress-wrap { margin-bottom: 16px; }
  .progress-label { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .progress-label span { font-size: 12px; color: rgba(255,255,255,0.5); }
  .progress-label .pnum { color: var(--sky); font-weight: 700; font-size: 14px; }
  .progress-bar-bg {
    height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: linear-gradient(to right, var(--sky), var(--coral));
    border-radius: 3px; transition: width 0.4s ease;
  }

  /* 문제 */
  .question-text {
    font-size: 17px; font-weight: 700; line-height: 1.6;
    margin-bottom: 20px; color: #fff;
    min-height: 50px;
  }

  /* 선택지 */
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .choice-btn {
    padding: 14px 12px; border-radius: 14px;
    background: rgba(255,255,255,0.06); border: 1.5px solid rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.9); font-size: 14px; font-weight: 600;
    cursor: pointer; text-align: center; line-height: 1.4;
    transition: all 0.15s; min-height: 60px;
    display: flex; align-items: center; justify-content: center;
  }
  .choice-btn:active { transform: scale(0.96); }
  .choice-btn.correct {
    background: rgba(46,213,115,0.2); border-color: #2ed573;
    color: #2ed573; animation: correctPop 0.4s ease;
  }
  .choice-btn.wrong {
    background: rgba(255,71,87,0.2); border-color: #ff4757;
    color: #ff4757; animation: wrongShake 0.4s ease;
  }
  @keyframes correctPop {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  @keyframes wrongShake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* 피드백 */
  .feedback-msg {
    text-align: center; font-size: 16px; font-weight: 700;
    padding: 12px; border-radius: 12px; margin-top: 14px;
    opacity: 0; transition: opacity 0.3s;
    min-height: 46px;
  }
  .feedback-msg.show { opacity: 1; }
  .feedback-msg.ok { background: rgba(46,213,115,0.15); color: #2ed573; }
  .feedback-msg.no { background: rgba(255,71,87,0.15); color: #ff6b7a; }

  /* ── 결과 화면 ── */
  #result-screen {
    position: fixed; inset: 0; z-index: 400; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    padding: 32px 24px;
    background: linear-gradient(160deg, #0a1628 0%, #0d2040 100%);
    overflow-y: auto;
  }
  .result-badge {
    font-size: 80px; margin-bottom: 8px;
    animation: badgePop 0.6s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes badgePop {
    0% { transform: scale(0) rotate(-20deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .result-title {
    font-size: 24px; font-weight: 900; margin-bottom: 6px;
    background: linear-gradient(135deg, #fff, var(--sky));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .result-score-row {
    display: flex; align-items: center; gap: 16px; margin: 20px 0;
  }
  .score-circle {
    width: 100px; height: 100px; border-radius: 50%;
    background: conic-gradient(var(--sky) var(--pct, 0%), rgba(255,255,255,0.1) 0%);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .score-inner {
    width: 80px; height: 80px; border-radius: 50%;
    background: var(--navy2);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 900; color: var(--sky);
  }
  .score-inner small { font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 400; }
  .result-msg {
    font-size: 15px; color: rgba(255,255,255,0.7); text-align: center; line-height: 1.8;
    max-width: 300px; margin-bottom: 8px;
  }
  .badges-row {
    display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; margin: 16px 0;
  }
  .badge-chip {
    background: rgba(32,160,224,0.15); border: 1px solid rgba(32,160,224,0.4);
    border-radius: 20px; padding: 6px 14px; font-size: 13px; color: var(--sky);
  }
  .result-btns { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 300px; margin-top: 20px; }
  .btn-retry {
    padding: 16px; border-radius: 14px;
    background: linear-gradient(135deg, var(--sky), #0070b0);
    border: none; color: #fff; font-size: 16px; font-weight: 700;
    cursor: pointer; transition: transform 0.15s;
  }
  .btn-retry:active { transform: scale(0.97); }
  .btn-qr {
    padding: 14px; border-radius: 14px;
    background: transparent; border: 1.5px solid rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.7); font-size: 15px; cursor: pointer;
    transition: border-color 0.15s;
  }
  .btn-qr:hover { border-color: var(--sky); }

  /* QR 모달 */
  #qr-modal {
    position: fixed; inset: 0; z-index: 500; display: none;
    align-items: center; justify-content: center;
    background: rgba(0,0,0,0.8); backdrop-filter: blur(6px);
  }
  #qr-modal.show { display: flex; }
  .qr-box {
    background: #fff; border-radius: 20px; padding: 28px 24px;
    text-align: center; max-width: 280px; width: 90%;
  }
  .qr-box h3 { font-size: 16px; color: #333; margin-bottom: 4px; }
  .qr-box p { font-size: 12px; color: #888; margin-bottom: 16px; }
  #qrcode { margin: 0 auto 16px; width: 160px; height: 160px; }
  #qrcode img { width: 100%; height: 100%; }
  .btn-close-qr {
    width: 100%; padding: 12px;
    background: var(--sky); border: none; border-radius: 10px;
    color: #fff; font-size: 15px; font-weight: 700; cursor: pointer;
  }

  /* 파티클 */
  .particle {
    position: fixed; pointer-events: none; z-index: 450;
    font-size: 24px;
    animation: particleFly var(--dur, 1.5s) ease-out forwards;
  }
  @keyframes particleFly {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--tx,0px), var(--ty,-200px)) scale(0); opacity: 0; }
  }

  /* A-Frame 캔버스 z-index */
  a-scene { width: 100%; height: 100%; }
  .a-enter-vr { display: none !important; }
</style>
</head>
<body>

<!-- 별 배경 -->
<div id="stars-bg"></div>

<!-- ════════════ 시작 화면 ════════════ -->
<div id="start-screen">
  <div class="app-num">#047</div>
  <div class="milab-logo">🔬 MILAB</div>
  <div class="hero-icon">🔭</div>
  <div class="app-title">AR 퀴즈 탐험대</div>
  <div class="app-sub">
    AR 마커를 비춰 퀴즈를 소환하세요!<br>
    마커마다 다른 문제가 나타납니다 ✨
  </div>

  <div class="marker-guide">
    <h3>📌 마커 가이드</h3>
    <div class="marker-row">
      <div class="marker-badge hiro">🔵</div>
      <div class="marker-info">
        <strong>Hiro 마커</strong>
        <span>AR·VR 기초 퀴즈 5문제</span>
      </div>
    </div>
    <div class="marker-row">
      <div class="marker-badge kanji">🟠</div>
      <div class="marker-info">
        <strong>Kanji 마커</strong>
        <span>메타버스·미래기술 퀴즈 5문제</span>
      </div>
    </div>
  </div>

  <button class="btn-start" onclick="startAR()">📷 AR 카메라 시작하기</button>
  <div class="grade-tag">🎓 초등 3~6학년 대상</div>
</div>

<!-- ════════════ AR 화면 ════════════ -->
<div id="ar-screen">
  <!-- HUD -->
  <div id="ar-hud">
    <div class="hud-title">🔭 AR 퀴즈 탐험대</div>
    <div class="hud-score" id="hud-score">점수: 0</div>
  </div>
  <button class="hud-back" onclick="goBack()">✕ 나가기</button>

  <!-- 스캔 가이드 -->
  <div id="scan-guide">
    <div class="scan-frame">
      <div class="scan-line"></div>
    </div>
    <p>마커를 화면 안에 비춰보세요 📷</p>
  </div>

  <!-- A-Frame AR Scene -->
  <a-scene id="ar-scene"
    embedded
    arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true;"
    loading-screen="enabled: false">

    <!-- 애셋 -->
    <a-assets>
      <a-mixin id="float-anim"
        animation="property: position; to: 0 0.5 0; dir: alternate; dur: 1500; loop: true; easing: easeInOutSine">
      </a-mixin>
      <a-mixin id="spin-anim"
        animation="property: rotation; to: 0 360 0; dur: 3000; loop: true; easing: linear">
      </a-mixin>
    </a-assets>

    <!-- Hiro 마커 - 스카이블루 물음표 큐브 -->
    <a-marker id="hiro-marker" preset="hiro" raycaster="objects: .clickable" emitevents="true" cursor="fuse: false">
      <a-entity id="hiro-obj" position="0 0.3 0">
        <!-- 큐브 -->
        <a-box
          color="#20A0E0"
          width="0.8" height="0.8" depth="0.8"
          animation="property: position; from: 0 0.3 0; to: 0 0.6 0; dir: alternate; dur: 1500; loop: true; easing: easeInOutSine"
          animation__rot="property: rotation; from: 0 0 0; to: 0 45 0; dir: alternate; dur: 2000; loop: true; easing: easeInOutSine"
          material="color: #20A0E0; metalness: 0.3; roughness: 0.4; emissive: #0050a0; emissiveIntensity: 0.3">
        </a-box>
        <!-- 물음표 텍스트 -->
        <a-text value="?" color="#ffffff" align="center" position="0 0.3 0.41"
          width="4" font="bold" wrap-count="1">
        </a-text>
        <!-- 글로우 구체 -->
        <a-sphere radius="0.55" material="color: #20A0E0; opacity: 0.08; transparent: true; side: double;"
          animation="property: scale; from: 1 1 1; to: 1.3 1.3 1.3; dir: alternate; dur: 1000; loop: true;">
        </a-sphere>
      </a-entity>
    </a-marker>

    <!-- Kanji 마커 - 코랄 별 -->
    <a-marker id="kanji-marker" preset="kanji" raycaster="objects: .clickable" emitevents="true" cursor="fuse: false">
      <a-entity id="kanji-obj" position="0 0.3 0">
        <!-- 별 형태 (여러 박스 조합) -->
        <a-entity
          animation__y="property: position; from: 0 0.3 0; to: 0 0.6 0; dir: alternate; dur: 1500; loop: true; easing: easeInOutSine"
          animation__r="property: rotation; to: 0 360 0; dur: 2500; loop: true; easing: linear">
          <a-box color="#F09070" width="0.9" height="0.3" depth="0.3"
            material="color: #F09070; emissive: #a04020; emissiveIntensity: 0.4; metalness: 0.2; roughness: 0.5">
          </a-box>
          <a-box color="#F09070" width="0.3" height="0.9" depth="0.3"
            material="color: #F09070; emissive: #a04020; emissiveIntensity: 0.4; metalness: 0.2; roughness: 0.5">
          </a-box>
          <a-box color="#F07050" width="0.6" height="0.6" depth="0.3"
            rotation="0 0 45"
            material="color: #F07050; emissive: #a03010; emissiveIntensity: 0.3; metalness: 0.2; roughness: 0.5">
          </a-box>
        </a-entity>
        <!-- 글로우 -->
        <a-sphere radius="0.6" material="color: #F09070; opacity: 0.07; transparent: true; side: double;"
          animation="property: scale; from: 1 1 1; to: 1.4 1.4 1.4; dir: alternate; dur: 1200; loop: true;">
        </a-sphere>
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <!-- 퀴즈 패널 -->
  <div id="quiz-panel">
    <div class="panel-handle"></div>
    <div id="marker-badge-label" class="panel-marker-badge hiro">🔵 Hiro 마커</div>

    <div class="progress-wrap">
      <div class="progress-label">
        <span>진행</span>
        <span class="pnum" id="q-progress">1 / 5</span>
      </div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="progress-fill" style="width:20%"></div>
      </div>
    </div>

    <div class="question-text" id="q-text">문제가 여기 표시됩니다.</div>

    <div class="choices" id="choices-wrap"></div>
    <div class="feedback-msg" id="feedback-msg"></div>
  </div>
</div>

<!-- ════════════ 결과 화면 ════════════ -->
<div id="result-screen">
  <div class="result-badge" id="result-badge">🏆</div>
  <div class="result-title" id="result-title">AR 마스터!</div>
  <div class="result-score-row">
    <div class="score-circle" id="score-circle">
      <div class="score-inner" id="score-inner">
        <span id="score-val">10</span>
        <small>/ 10</small>
      </div>
    </div>
  </div>
  <div class="result-msg" id="result-msg">완벽한 탐험이었어요!</div>
  <div class="badges-row" id="badges-row"></div>
  <div class="result-btns">
    <button class="btn-retry" onclick="resetGame()">🔄 다시 탐험하기</button>
    <button class="btn-qr" onclick="showQR()">📲 QR로 공유하기</button>
  </div>
</div>

<!-- QR 모달 -->
<div id="qr-modal">
  <div class="qr-box">
    <h3>📲 친구에게 공유하기</h3>
    <p>QR코드를 스캔해서 앱을 열어보세요!</p>
    <div id="qrcode"></div>
    <button class="btn-close-qr" onclick="closeQR()">닫기</button>
  </div>
</div>

<script>
// ──────────────────────────────────────────────
// 데이터
// ──────────────────────────────────────────────
const QUIZ_DATA = {
  hiro: {
    label: '🔵 Hiro 마커',
    badge: 'hiro',
    badgeName: '🔵 AR 탐험가',
    questions: [
      { q: 'Q1. AR은 무슨 뜻일까요?', choices: ['인공 로봇', '증강 현실', '자동 반응', '애니메이션 리얼'], ans: 1 },
      { q: 'Q2. VR 기기를 쓰면 어떤 일이 일어날까요?', choices: ['하늘을 날 수 있다', '완전히 다른 가상 세계에 들어간 느낌이 든다', '친구가 사라진다', '스마트폰이 필요 없어진다'], ans: 1 },
      { q: 'Q3. AR 앱을 사용할 때 꼭 필요한 것은?', choices: ['마우스', '키보드', '카메라', '프린터'], ans: 2 },
      { q: 'Q4. 현실 세계에 가상 정보를 덧붙여 보여주는 기술은?', choices: ['VR', 'AR', 'AI', 'IoT'], ans: 1 },
      { q: 'Q5. 스마트폰으로 책을 비추면 캐릭터가 튀어나오는 것은 어떤 기술인가요?', choices: ['3D 프린팅', '드론', '증강현실(AR)', '블록체인'], ans: 2 },
    ]
  },
  kanji: {
    label: '🟠 Kanji 마커',
    badge: 'kanji',
    badgeName: '🟠 메타버스 탐험가',
    questions: [
      { q: 'Q1. 메타버스란 무엇인가요?', choices: ['우주 탐험 게임', '현실과 연결된 3D 가상 세계', '로봇 제어 기술', '인터넷 검색 엔진'], ans: 1 },
      { q: 'Q2. 메타버스에서 나를 대신하는 캐릭터를 무엇이라고 할까요?', choices: ['아이콘', '이모지', '아바타', '캡처'], ans: 2 },
      { q: 'Q3. VR과 AR의 가장 큰 차이점은?', choices: ['가격이 다르다', 'VR은 현실을 완전히 차단하고 AR은 현실 위에 가상을 더한다', 'AR이 더 오래됐다', '차이가 없다'], ans: 1 },
      { q: 'Q4. 미래에 메타버스에서 할 수 없을 것 같은 것은?', choices: ['친구와 게임하기', '콘서트 관람', '밥 먹기', '수업 듣기'], ans: 2 },
      { q: 'Q5. XR이란 무엇의 줄임말인가요?', choices: ['엑스트라 로봇', '확장 현실(Extended Reality)', '엑스박스 리얼', '초고화질 화면'], ans: 1 },
    ]
  }
};

const PRAISE = ['완벽해요! 🎉', '대단해요! ⭐', '맞았어요! 👍', '훌륭해요! 🌟', '정확해요! 💯'];

// ──────────────────────────────────────────────
// 상태
// ──────────────────────────────────────────────
let state = {
  currentMarker: null,   // 'hiro' | 'kanji'
  qIndex: 0,
  score: { hiro: 0, kanji: 0 },
  answered: { hiro: [], kanji: [] },
  totalScore: 0,
  earnedBadges: [],
  locked: false,
  arStarted: false,
};

// ──────────────────────────────────────────────
// LocalStorage
// ──────────────────────────────────────────────
function loadSave() {
  try {
    const s = JSON.parse(localStorage.getItem('milab047') || '{}');
    if (s.earnedBadges) state.earnedBadges = s.earnedBadges;
  } catch(e) {}
}
function saveData() {
  try {
    localStorage.setItem('milab047', JSON.stringify({
      bestScore: state.totalScore,
      earnedBadges: state.earnedBadges,
    }));
  } catch(e) {}
}

// ──────────────────────────────────────────────
// 별 생성
// ──────────────────────────────────────────────
function createStars() {
  const bg = document.getElementById('stars-bg');
  for (let i = 0; i < 80; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const size = Math.random() * 3 + 1;
    s.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%; top:${Math.random()*100}%;
      --dur:${2+Math.random()*4}s; --delay:${Math.random()*4}s;
      --op:${0.4+Math.random()*0.6};
    `;
    bg.appendChild(s);
  }
}

// ──────────────────────────────────────────────
// Web Audio API
// ──────────────────────────────────────────────
let audioCtx = null;
function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playCorrect() {
  try {
    const ctx = getCtx();
    const notes = [523, 659, 784];
    notes.forEach((f, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = f;
      osc.type = 'triangle';
      gain.gain.setValueAtTime(0.25, ctx.currentTime + i*0.1);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.1 + 0.3);
      osc.start(ctx.currentTime + i*0.1);
      osc.stop(ctx.currentTime + i*0.1 + 0.3);
    });
  } catch(e) {}
}
function playWrong() {
  try {
    const ctx = getCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = 200;
    osc.type = 'sawtooth';
    gain.gain.setValueAtTime(0.2, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}
function playFanfare() {
  try {
    const ctx = getCtx();
    const melody = [523,659,784,1047];
    melody.forEach((f, i) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = f;
      osc.type = 'triangle';
      gain.gain.setValueAtTime(0.3, ctx.currentTime + i*0.12);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.12 + 0.3);
      osc.start(ctx.currentTime + i*0.12);
      osc.stop(ctx.currentTime + i*0.12 + 0.35);
    });
  } catch(e) {}
}

// ──────────────────────────────────────────────
// AR 시작
// ──────────────────────────────────────────────
function startAR() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('ar-screen').style.display = 'block';
  state.arStarted = true;

  // A-Frame 씬 이벤트 바인딩 (씬 로딩 후)
  const scene = document.getElementById('ar-scene');
  scene.addEventListener('loaded', bindMarkerEvents);
  // 이미 로딩된 경우 바로
  if (scene.hasLoaded) bindMarkerEvents();
}

function bindMarkerEvents() {
  const hiroMarker = document.getElementById('hiro-marker');
  const kanjiMarker = document.getElementById('kanji-marker');

  if (hiroMarker) {
    hiroMarker.addEventListener('markerFound', () => onMarkerFound('hiro'));
    hiroMarker.addEventListener('markerLost', onMarkerLost);
  }
  if (kanjiMarker) {
    kanjiMarker.addEventListener('markerFound', () => onMarkerFound('kanji'));
    kanjiMarker.addEventListener('markerLost', onMarkerLost);
  }
}

function onMarkerFound(markerType) {
  if (state.currentMarker === markerType) return;
  state.currentMarker = markerType;
  document.getElementById('scan-guide').style.opacity = '0';

  // 패널 내용 초기화
  const data = QUIZ_DATA[markerType];
  document.getElementById('marker-badge-label').textContent = data.label;
  document.getElementById('marker-badge-label').className = 'panel-marker-badge ' + markerType;

  state.qIndex = state.answered[markerType].length;

  if (state.qIndex >= data.questions.length) {
    // 이미 풀었으면 결과
    showResult();
    return;
  }

  showPanel();
  renderQuestion();
}

function onMarkerLost() {
  state.currentMarker = null;
  hidePanel();
  document.getElementById('scan-guide').style.opacity = '1';
}

// ──────────────────────────────────────────────
// 퀴즈 패널
// ──────────────────────────────────────────────
function showPanel() {
  document.getElementById('quiz-panel').classList.add('visible');
}
function hidePanel() {
  document.getElementById('quiz-panel').classList.remove('visible');
}

function renderQuestion() {
  const marker = state.currentMarker;
  if (!marker) return;
  const data = QUIZ_DATA[marker];
  const idx = state.qIndex;
  if (idx >= data.questions.length) {
    // 세트 완료
    if (!state.earnedBadges.includes(data.badgeName)) {
      state.earnedBadges.push(data.badgeName);
    }
    // 전체 완료 체크
    const hiroTotal = QUIZ_DATA.hiro.questions.length;
    const kanjiTotal = QUIZ_DATA.kanji.questions.length;
    if (state.answered.hiro.length >= hiroTotal && state.answered.kanji.length >= kanjiTotal) {
      setTimeout(() => { hidePanel(); showResult(); }, 600);
    } else {
      showFeedback('🎉 이 마커 퀴즈 완료! 다른 마커를 비춰보세요!', true);
      setTimeout(hidePanel, 2500);
    }
    return;
  }
  const q = data.questions[idx];
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('q-progress').textContent = `${idx+1} / ${data.questions.length}`;
  document.getElementById('progress-fill').style.width = `${((idx+1)/data.questions.length)*100}%`;

  // 선택지 렌더
  const wrap = document.getElementById('choices-wrap');
  wrap.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = `${['①','②','③','④'][i]} ${c}`;
    btn.onclick = () => selectAnswer(i, btn);
    wrap.appendChild(btn);
  });

  // 피드백 초기화
  const fb = document.getElementById('feedback-msg');
  fb.className = 'feedback-msg';
  fb.textContent = '';
  state.locked = false;
}

function selectAnswer(idx, btn) {
  if (state.locked) return;
  state.locked = true;
  const marker = state.currentMarker;
  const data = QUIZ_DATA[marker];
  const q = data.questions[state.qIndex];
  const isCorrect = idx === q.ans;

  // 버튼 색
  const btns = document.querySelectorAll('.choice-btn');
  btns[q.ans].classList.add('correct');
  if (!isCorrect) btn.classList.add('wrong');

  // 점수
  if (isCorrect) {
    state.score[marker]++;
    state.answered[marker].push(1);
    playCorrect();
    showFeedback(PRAISE[Math.floor(Math.random()*PRAISE.length)], true);
  } else {
    state.answered[marker].push(0);
    playWrong();
    showFeedback('아쉽지만 괜찮아요! 다시 도전! 💪', false);
  }

  // 허드 점수
  updateHudScore();

  // 다음 문제
  state.qIndex++;
  setTimeout(() => {
    if (state.qIndex < data.questions.length) {
      renderQuestion();
    } else {
      // 세트 완료
      const badgeName = data.badgeName;
      if (!state.earnedBadges.includes(badgeName)) state.earnedBadges.push(badgeName);
      const hiroTotal = QUIZ_DATA.hiro.questions.length;
      const kanjiTotal = QUIZ_DATA.kanji.questions.length;
      if (state.answered.hiro.length >= hiroTotal && state.answered.kanji.length >= kanjiTotal) {
        setTimeout(() => { hidePanel(); showResult(); }, 1200);
      } else {
        showFeedback('🎉 이 마커 완료! 다른 마커를 비춰보세요!', true);
        setTimeout(hidePanel, 2500);
      }
    }
  }, 1500);
}

function showFeedback(msg, isOk) {
  const fb = document.getElementById('feedback-msg');
  fb.textContent = msg;
  fb.className = 'feedback-msg show ' + (isOk ? 'ok' : 'no');
}

function updateHudScore() {
  const total = state.score.hiro + state.score.kanji;
  document.getElementById('hud-score').textContent = `점수: ${total}`;
}

// ──────────────────────────────────────────────
// 결과 화면
// ──────────────────────────────────────────────
function showResult() {
  state.totalScore = state.score.hiro + state.score.kanji;
  const maxScore = QUIZ_DATA.hiro.questions.length + QUIZ_DATA.kanji.questions.length;
  saveData();

  // 엔딩 결정
  let badge, title, msg;
  if (state.totalScore === maxScore) {
    badge = '🏆'; title = 'AR 마스터!';
    msg = '모든 문제를 맞혔어요!\n정말 훌륭한 AR 탐험가예요! 🎉';
    playFanfare();
    spawnParticles();
  } else if (state.totalScore >= 7) {
    badge = '🚀'; title = 'AR 탐험가!';
    msg = `${state.totalScore}점을 획득했어요!\n다음엔 완벽하게 도전해봐요! ⭐`;
    spawnStars();
  } else {
    badge = '🌱'; title = 'AR 새싹!';
    msg = `${state.totalScore}점! 잘 도전했어요!\n다시 마커를 비춰 더 배워봐요! 💪`;
  }

  document.getElementById('result-badge').textContent = badge;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-msg').textContent = msg;
  document.getElementById('score-val').textContent = state.totalScore;
  document.getElementById('score-circle').style.setProperty('--pct', `${(state.totalScore/maxScore)*360}deg`);

  // 뱃지
  const row = document.getElementById('badges-row');
  row.innerHTML = '';
  state.earnedBadges.forEach(b => {
    const chip = document.createElement('div');
    chip.className = 'badge-chip';
    chip.textContent = b;
    row.appendChild(chip);
  });

  document.getElementById('ar-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'flex';

  // portfolioEntry 출력
  console.log(JSON.stringify({
    id: "047",
    title: "AR 퀴즈 탐험대",
    category: "AR/VR + 퀴즈",
    tags: ["WebAR", "AR.js", "퀴즈", "초등", "메타버스"],
    deployUrl: "https://milab2019.github.io/main/milab_ar_quiz_047.html",
    date: "2026.04",
    grade: ["초등3", "초등4", "초등5", "초등6"]
  }, null, 2));
}

// ──────────────────────────────────────────────
// 파티클 이펙트
// ──────────────────────────────────────────────
function spawnParticles() {
  const emojis = ['🎉','⭐','✨','🏆','🎊','💫','🌟'];
  for (let i = 0; i < 20; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = emojis[Math.floor(Math.random()*emojis.length)];
      const x = Math.random()*window.innerWidth;
      const y = Math.random()*window.innerHeight*0.5 + window.innerHeight*0.4;
      p.style.left = x+'px'; p.style.top = y+'px';
      p.style.setProperty('--tx', (Math.random()*200-100)+'px');
      p.style.setProperty('--ty', -(Math.random()*300+100)+'px');
      p.style.setProperty('--dur', (1+Math.random()*1)+'s');
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 2500);
    }, i*80);
  }
}
function spawnStars() {
  for (let i = 0; i < 10; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = ['⭐','🌟','✨'][Math.floor(Math.random()*3)];
      const x = Math.random()*window.innerWidth;
      const y = Math.random()*window.innerHeight*0.6 + window.innerHeight*0.3;
      p.style.left = x+'px'; p.style.top = y+'px';
      p.style.setProperty('--tx', (Math.random()*160-80)+'px');
      p.style.setProperty('--ty', -(Math.random()*200+80)+'px');
      p.style.setProperty('--dur', '1.5s');
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 2000);
    }, i*100);
  }
}

// ──────────────────────────────────────────────
// QR 코드
// ──────────────────────────────────────────────
let qrGenerated = false;
function showQR() {
  document.getElementById('qr-modal').classList.add('show');
  if (!qrGenerated) {
    qrGenerated = true;
    const container = document.getElementById('qrcode');
    container.innerHTML = '';
    const qr = new QRCode(container, {
      text: 'https://milab2019.github.io/main/milab_ar_quiz_047.html',
      width: 160, height: 160,
      colorDark: '#0a1628', colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
    // img 방식 보정
    setTimeout(() => {
      const canvas = container.querySelector('canvas');
      if (canvas) {
        const img = document.createElement('img');
        img.src = canvas.toDataURL();
        img.style.width = '100%';
        container.innerHTML = '';
        container.appendChild(img);
      }
    }, 300);
  }
}
function closeQR() {
  document.getElementById('qr-modal').classList.remove('show');
}

// ──────────────────────────────────────────────
// 리셋 & 나가기
// ──────────────────────────────────────────────
function resetGame() {
  state.currentMarker = null;
  state.qIndex = 0;
  state.score = { hiro: 0, kanji: 0 };
  state.answered = { hiro: [], kanji: [] };
  state.totalScore = 0;
  state.locked = false;

  document.getElementById('result-screen').style.display = 'none';
  document.getElementById('ar-screen').style.display = 'block';
  document.getElementById('scan-guide').style.opacity = '1';
  document.getElementById('hud-score').textContent = '점수: 0';
  hidePanel();
}

function goBack() {
  document.getElementById('ar-screen').style.display = 'none';
  document.getElementById('start-screen').style.display = 'flex';
  hidePanel();
  state.currentMarker = null;
}

// ──────────────────────────────────────────────
// 초기화
// ──────────────────────────────────────────────
createStars();
loadSave();
</script>
</body>
</html>
