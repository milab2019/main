<style>
  :root {
    --bg: #0a0e1a;
    --card: #131929;
    --card2: #1a2236;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --accent3: #f59e0b;
    --green: #10b981;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --border: #2d3748;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 16px;
  }
  #app { max-width: 720px; margin: 0 auto; padding: 16px; }

  /* ── 공통 버튼 ── */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    padding: 14px 28px; border-radius: 12px; border: none; cursor: pointer;
    font-size: 16px; font-weight: 700; transition: all .2s; min-height: 52px;
  }
  .btn-primary { background: linear-gradient(135deg,#00d4ff,#7c3aed); color:#fff; }
  .btn-primary:hover { opacity:.85; transform:translateY(-2px); }
  .btn-secondary { background: var(--card2); color: var(--accent); border: 2px solid var(--accent); }
  .btn-secondary:hover { background: var(--accent); color:#0a0e1a; }
  .btn-sm { padding: 10px 18px; font-size: 14px; min-height: 44px; }
  .btn-hint { background: #1e293b; color: var(--accent3); border: 2px solid var(--accent3); }
  .btn-hint:hover { background: var(--accent3); color:#0a0e1a; }

  /* ── 카드 ── */
  .card { background: var(--card); border-radius: 20px; padding: 24px; margin-bottom: 16px; border: 1px solid var(--border); }

  /* ── 헤더바 ── */
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 16px;
  }
  .top-bar .logo { font-size: 13px; color: var(--muted); font-weight: 700; letter-spacing: 2px; }
  .music-btn {
    background: var(--card2); border: 1px solid var(--border); color: var(--accent);
    border-radius: 8px; padding: 8px 14px; cursor: pointer; font-size: 18px;
  }

  /* ── 타이틀 ── */
  .title-screen { text-align: center; }
  .title-logo { font-size: 56px; margin: 16px 0; animation: float 3s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .title-screen h1 { font-size: 26px; background: linear-gradient(90deg,#00d4ff,#7c3aed,#f59e0b); -webkit-background-clip:text; -webkit-text-fill-color:transparent; line-height: 1.4; margin-bottom: 8px; }
  .title-screen p { color: var(--muted); font-size: 15px; margin-bottom: 20px; }

  /* ── 미션 진행바 ── */
  .mission-track {
    display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .mission-dot {
    flex: 1; min-width: 70px; padding: 10px 8px; border-radius: 10px; text-align: center;
    font-size: 12px; font-weight: 700; border: 2px solid var(--border); color: var(--muted);
    transition: all .3s;
  }
  .mission-dot.done { border-color: var(--green); color: var(--green); background: #052e16; }
  .mission-dot.active { border-color: var(--accent); color: var(--accent); background: #0c1a2e; animation: pulse-border 1.5s infinite; }
  @keyframes pulse-border { 0%,100%{box-shadow:0 0 0 0 rgba(0,212,255,.4)} 50%{box-shadow:0 0 0 6px rgba(0,212,255,0)} }

  /* ── 점수·뱃지 ── */
  .score-bar { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .score-box { background: var(--card2); border-radius: 10px; padding: 8px 16px; font-size: 14px; font-weight: 700; }
  .score-box span { color: var(--accent); font-size: 20px; }
  .badge-row { display: flex; gap: 6px; }
  .badge { font-size: 20px; filter: grayscale(1) opacity(.3); transition:.3s; }
  .badge.earned { filter: none; }

  /* ── 마스코트 ── */
  .mascot-wrap { display: flex; align-items: flex-end; gap: 12px; margin-bottom: 16px; }
  .mascot-svg { width: 72px; flex-shrink: 0; }
  .speech-bubble {
    background: var(--card2); border: 2px solid var(--accent); border-radius: 16px;

  }
  .speech-bubble::before {
    content:''; position:absolute; left:-14px; bottom:14px;
    border: 7px solid transparent; border-right-color: var(--accent);
  }

  /* ── 문제 ── */
  .q-label { font-size: 12px; color: var(--accent); font-weight:700; margin-bottom:6px; letter-spacing:1px; }
  .q-text { font-size: 18px; font-weight: 700; line-height: 1.6; margin-bottom: 18px; }
  .q-options { display: flex; flex-direction: column; gap: 10px; }
  .q-opt {
    background: var(--card2); border: 2px solid var(--border); border-radius: 12px;
    padding: 14px 18px; cursor: pointer; font-size: 15px; line-height: 1.5; text-align: left;
    transition: all .2s; color: var(--text);

  .q-opt.wrong { border-color: var(--red); background: #1a0b0b; color: #fca5a5; font-weight: 700; }
  .q-opt.reveal { border-color: var(--green); background: #052e16; color: #6ee7b7; font-weight: 700; }

  /* ── 타이머 ── */
  .timer-bar-wrap { height: 8px; background: var(--border); border-radius: 4px; margin-bottom: 14px; overflow:hidden; }

  .timer-num { text-align:right; font-size:13px; color:var(--muted); margin-bottom:6px; }
  .timer-num.danger { color:var(--red); font-weight:700; }

  /* ── 힌트 피드백 박스 ── */

  .feedback-box.fail { background:#1a0b0b; border:1px solid var(--red); color:#fca5a5; }

  .result-title { font-size: 24px; font-weight:900; margin: 12px 0 6px; }

  .leaderboard { text-align:left; }
  .lb-row { display:flex; align-items:center; gap:10px; padding:10px; border-radius:10px; margin-bottom:6px; background:var(--card2); }
  .lb-rank { font-size:18px; width:28px; text-align:center; }

  /* ── QR ── */

  .qr-box { background:#fff; padding:10px; border-radius:12px; }

  /* ── 탭 ── */

  /* ── 데이터 차트 (SVG) ── */

  .bar-track { flex:1; background:var(--border); border-radius:4px; height:22px; position:relative; }
  .bar-fill { height:100%; border-radius:4px; display:flex; align-items:center; padding-left:8px; font-size:12px; font-weight:700; color:#fff; }

  .hidden { display:none !important; }

  @media(max-width:480px) {
    .q-text { font-size:16px; }
    .tab-btn { font-size:12px; padding:10px 6px; }
    .mission-dot { font-size:11px; }
  }
</style>

const portfolioEntry = {

  title: "🤖 로봇 스포츠 올림픽 2050",
  target: "중학교 공통",

  theme: "로봇 스포츠 / 진로 탐색 / AI 리터러시",
  date: "2026-04-08",
  url: "https://milab2019.github.io/main/milab_robot_sports_038.html"
};
console.log("portfolioEntry:", JSON.stringify(portfolioEntry, null, 2));

// ═══════════════════════════════════════════
//  Web Audio API
// ═══════════════════════════════════════════
let audioCtx, musicNode, musicGain, musicOn = true;
function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  musicGain = audioCtx.createGain(); musicGain.gain.value = 0.12;
  musicGain.connect(audioCtx.destination);
  playBgm();
}
function playBgm() {
  if (!audioCtx || !musicOn) return;
  const notes = [220,261,294,330,294,261,220,196,220,261,330,392,440,392,330,294];
  let t = audioCtx.currentTime;
  notes.forEach((f, i) => {
    const o = audioCtx.createOscillator();
    o.type = 'sine'; o.frequency.value = f;
    o.connect(musicGain);
    o.start(t + i * 0.22);
    o.stop(t + i * 0.22 + 0.2);
  });
  setTimeout(playBgm, notes.length * 220 + 400);
}
function toggleMusic() {
  initAudio();
  musicOn = !musicOn;
  if (musicGain) musicGain.gain.value = musicOn ? 0.12 : 0;
  document.getElementById('musicBtn').textContent = musicOn ? '🔊' : '🔇';
}
function sfx(type) {
  if (!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.connect(g); g.connect(audioCtx.destination);
  if (type === 'correct') { o.frequency.value = 660; o.type='triangle'; g.gain.value=0.3; o.start(); o.stop(audioCtx.currentTime+0.3); }
  if (type === 'wrong')   { o.frequency.value = 200; o.type='sawtooth'; g.gain.value=0.2; o.start(); o.stop(audioCtx.currentTime+0.25); }
  if (type === 'clear')   {

function makeQR(elId) {

  try {

function setMascot(emotion, text) {
  const eyeL = document.getElementById('eyeL');
  const eyeR = document.getElementById('eyeR');
  const mouth = document.getElementById('mouth');
  const speech = document.getElementById('mascotSpeech');
  if (!eyeL) return;
  if (emotion==='happy') {
    eyeL.setAttribute('fill','#f59e0b'); eyeR.setAttribute('fill','#f59e0b');
    mouth.setAttribute('fill','#10b981'); mouth.setAttribute('height','6');
  } else if (emotion==='sad') {
    eyeL.setAttribute('fill','#ef4444'); eyeR.setAttribute('fill','#ef4444');
    mouth.setAttribute('fill','#6b7280'); mouth.setAttribute('height','4');
  } else {
    eyeL.setAttribute('fill','#00d4ff'); eyeR.setAttribute('fill','#00d4ff');
    mouth.setAttribute('fill','#7c3aed'); mouth.setAttribute('height','4');
  }
  if (speech && text) speech.innerHTML = text;
}

  if (m1HintUsed[m1Idx]) return;

  document.getElementById('m1Feedback').innerHTML=`<div class="feedback-box hint">💡 힌트: ${m1Questions[m1Idx].hint}</div>`;
}
function answerM1(idx) {
  const q=m1Questions[m1Idx];
  const opts=document.querySelectorAll('#m1Opts .q-opt');
  opts.forEach(b=>b.disabled=true);
  state.total++;
  if (idx===q.ans) {
    opts[idx].classList.add('correct');
    state.score+=10; state.correct++;
    sfx('correct'); setMascot('happy','정답이야! 🎉 '+q.explain);
    document.getElementById('m1Feedback').innerHTML=`<div class="feedback-box ok">✅ 정답! ${q.explain}</div>`;

      <div style="font-size:13px;color:var(--muted);margin:8px 0 4px;">✅ 순서 슬롯 (1→${s.items.length}):</div>
      <div style="display:flex;flex-direction:column;gap:6px;" id="m3SlotArea">
        ${s.items.map((_,i)=>`<div class="drop-slot" id="slot_${i}" onclick="placeChip(${i})"><span style="color:var(--border);font-size:12px;">Step ${i+1}</span></div>`).join('')}
      </div>
      <div id="m3Feedback"></div>
      <div style="display:flex;gap:8px;margin-top:14px;">
        <button class="btn btn-secondary btn-sm" onclick="resetM3()">🔄 초기화</button>
        <button class="btn btn-primary btn-sm" style="flex:1;" onclick="checkM3()">✅ 정답 확인!</button>
      </div>
    </div>`;
  m3SelectedChip=null;
}
let m3SelectedChip=null;
function selectChip(id) {
  // 이미 선택된 칩이면 해제
  if (m3SelectedChip===id) { m3SelectedChip=null; document.querySelectorAll('.drag-chip').forEach(c=>c.style.outline=''); return; }
  m3SelectedChip=id;
  document.querySelectorAll('.drag-chip').forEach(c=>c.style.outline='');
  const ch=document.getElementById('chip_'+id);
  if (ch && !ch.classList.contains('placed')) ch.style.outline='3px solid var(--accent)';
}
function placeChip(slotIdx) {
  if (!m3SelectedChip) return;
  const s=m3Sets[m3SetIdx];
  // 이미 채워진 슬롯이면 기존 칩 돌려놓기
  if (m3Slots[slotIdx]) {
    const prev=m3Slots[slotIdx];
    const prevEl=document.getElementById('chip_'+prev);
    if (prevEl) { prevEl.classList.remove('placed'); prevEl.style.display=''; }
  }
  m3Slots[slotIdx]=m3SelectedChip;
  const ch=document.getElementById('chip_'+m3SelectedChip);
  if (ch) { ch.classList.add('placed'); ch.style.outline=''; }
  // 슬롯 업데이트
  const slot=document.getElementById('slot_'+slotIdx);
  const item=s.items.find(i=>i.id===m3SelectedChip);
  if (slot&&item) { slot.classList.add('filled'); slot.innerHTML=`<span class="slot-chip">${item.text}</span><span style="font-size:11px;color:var(--muted);margin-left:4px;cursor:pointer;" onclick="clearSlot(${slotIdx})">✕</span>`; }
  m3SelectedChip=null;
}
function clearSlot(idx) {
  const prev=m3Slots[idx];
  if (!prev) return;
  const prevEl=document.getElementById('chip_'+prev);
  if (prevEl) { prevEl.classList.remove('placed'); prevEl.style.display=''; }
  m3Slots[idx]=null;
  const slot=document.getElementById('slot_'+idx);
  if (slot) { slot.classList.remove('filled'); slot.innerHTML=`<span style="color:var(--border);font-size:12px;">Step ${idx+1}</span>`; }
}
function resetM3() {
  m3Slots=Array(m3Sets[m3SetIdx].items.length).fill(null); m3SelectedChip=null;
  renderM3UI();
}
function checkM3() {
  const s=m3Sets[m3SetIdx];
  if (m3Slots.some(v=>v===null)) {
    document.getElementById('m3Feedback').innerHTML=`<div class="feedback-box hint">⚠️ 모든 슬롯을 채워주세요!</div>`;
    return;
  }
  const correct = s.answer.every((ans,i)=>m3Slots[i]===ans);
  state.total++;
  if (correct) {
    state.score+=20; state.correct++; sfx('correct'); setMascot('happy','완벽해! AI 알고리즘 마스터! 🤖');
    document.getElementById('m3Feedback').innerHTML=`<div class="feedback-box ok">✅ 정확한 순서! AI처럼 논리적으로 생각했어요! +20점</div>`;
  } else {
    // 부분 점수
    const partScore = s.answer.reduce((acc,ans,i)=>acc+(m3Slots[i]===ans?1:0),0);
    const pts=partScore*2; state.score+=pts;
    sfx('wrong'); setMascot('sad','좋은 시도야! 이런 생각도 있어: 순서를 다시 살펴봐!');
    document.getElementById('m3Feedback').innerHTML=`<div class="feedback-box fail">❌ 아쉬워요! ${partScore}/${s.items.length}개 정확 (부분 점수 +${pts}점)<br>정답 순서: ${s.answer.map(id=>s.items.find(it=>it.id===id)?.text).join(' → ')}</div>`;
  }
  updateScore();
  setTimeout(()=>{ m3SetIdx++; renderM3Set(); },2000);
}
function finishMission3() {
  state.badges[2]=true; renderBadges(); renderMissionTrack(); sfx('clear');
  setMascot('happy','미션3 완료! AI 체험 끝! 🤖');
  document.getElementById('missionContent').innerHTML=`<div class="card" style="text-align:center;">
    <div style="font-size:48px;">🤖✅</div>
    <h2 style="margin:10px 0;">미션3 완료!</h2>
    <p style="color:var(--muted);">AI 알고리즘 순서 정렬 체험 완료!</p>
    <button class="btn btn-primary" style="width:100%;margin-top:16px;" onclick="startMission(4)">⚖️ 미션4 시작!</button>
  </div>`;
}

// ═══════════════════════════════════════════
//  미션 4 (진로·판단, 멀티엔딩)
// ═══════════════════════════════════════════
let m4Idx=0;
function renderMission4() {
  m4Idx=0; state.m4Choices=[];
  renderM4Q();
}
function renderM4Q() {
  if (m4Idx>=m4Scenarios.length) { finishMission4(); return; }
  const sc=m4Scenarios[m4Idx];
  document.getElementById('missionContent').innerHTML=`
    <div class="card">
      <div class="q-label">⚖️ 미션4 · 진로·사회 판단 (${m4Idx+1}/${m4Scenarios.length})</div>
      <div class="scenario-box"><b>${sc.title}</b><br><br>${sc.desc}</div>
      <div class="scenario-opts">
        ${sc.opts.map((o,i)=>`<button class="scenario-opt" onclick="chooseM4(${i})">${o.text}</button>`).join('')}
      </div>
    </div>`;
}
function chooseM4(idx) {
  const sc=m4Scenarios[m4Idx];
  state.m4Choices.push(sc.opts[idx].career);
  state.score+=15; state.correct++; state.total++;
  sfx('correct'); setMascot('happy','훌륭한 선택이야! 자신만의 진로를 찾고 있어! 💡');
  updateScore();
  m4Idx++;
  setTimeout(renderM4Q, 600);
}
function finishMission4() {
  state.badges[3]=true; renderBadges(); renderMissionTrack(); sfx('clear');
  setMascot('happy','4개 미션 모두 완료! 대단해! 🏆');
  document.getElementById('missionContent').innerHTML=`<div class="card" style="text-align:center;">
    <div style="font-size:48px;">⚖️✅</div>
    <h2 style="margin:10px 0;">미션4 완료!</h2>
    <button class="btn btn-primary" style="width:100%;margin-top:16px;" onclick="showResult()">🏆 결과 보기!</button>
  </div>`;
}

// ═══════════════════════════════════════════
//  결과 화면
// ═══════════════════════════════════════════
function showResult() {
  const pct = state.total>0 ? Math.round(state.score/(state.total*20)*100) : 0;
  const endKey = pct>=80?80:pct>=60?60:pct>=40?40:0;
  const ending = ENDINGS[endKey];
  document.getElementById('resultTrophy').textContent=ending.trophy;
  document.getElementById('resultTitle').textContent=ending.title;
  document.getElementById('resultScore').textContent=state.score+'점';
  document.getElementById('finalCorrect').textContent=state.correct;
  document.getElementById('finalTotal').textContent=state.total;
  // 진로 분석
  const careerCount={};
  state.m4Choices.forEach(c=>{ careerCount[c]=(careerCount[c]||0)+1; });
  const topCareer=Object.entries(careerCount).sort((a,b)=>b[1]-a[1])[0]?.[0]||'ai';
  const careerMap={ai:'🤖 AI 알고리즘 개발자',hw:'🔧 로봇 하드웨어 엔지니어',data:'📊 데이터 분석가',ethics:'⚖️ 로봇 스포츠 윤리 연구자',media:'📡 방송 해설가',team:'🤝 팀 리더·조율 전문가',neutral:'🔍 탐색 중'};
  document.getElementById('resultCareer').innerHTML=`
    <div style="font-size:13px;color:var(--accent);font-weight:700;margin-bottom:8px;">🚀 당신의 2050년 진로 적성</div>
    <div style="font-size:20px;font-weight:900;margin-bottom:6px;">${careerMap[topCareer]||'🤖 AI 개발자'}</div>
    <div style="font-size:14px;color:var(--muted);">${ending.career}</div>
    <div style="margin-top:10px;font-size:15px;">${ending.msg}</div>`;
  renderLeaderboard();
  show('screenResult');
  setTimeout(function() { makeQR('qrResult'); }, 300);
}
function registerScore() {
  const name=document.getElementById('lbName').value.trim()||state.nick||'탐험가';
  const lb=JSON.parse(localStorage.getItem('milab_038_lb')||'[]');
  lb.push({name,score:state.score,date:new Date().toLocaleDateString('ko-KR')});
  lb.sort((a,b)=>b.score-a.score);
  lb.splice(5);
  localStorage.setItem('milab_038_lb',JSON.stringify(lb));
  renderLeaderboard();
}
function renderLeaderboard() {
  const lb=JSON.parse(localStorage.getItem('milab_038_lb')||'[]');
  const medals=['🥇','🥈','🥉','4️⃣','5️⃣'];
  document.getElementById('lbList').innerHTML=lb.length?lb.map((r,i)=>`
    <div class="lb-row">
      <div class="lb-rank">${medals[i]||i+1}</div>
      <div class="lb-name">${r.name}</div>
      <div class="lb-score">${r.score}점</div>
      <div style="font-size:12px;color:var(--muted);">${r.date}</div>
    </div>`).join(''):'<div style="color:var(--muted);text-align:center;padding:16px;">아직 등록된 점수가 없어요!</div>';
}
function restartGame() {
  resetState();
  show('screenNick');
}
</script>
</body>
