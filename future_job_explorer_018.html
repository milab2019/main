<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🚀 2050 미래 직업 신호등 | MILAB #018</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root {
    --bg-deep: #050d1a;
    --bg-card: #0a1628;
    --bg-panel: #0f1f36;
    --accent-cyan: #00d4ff;
    --accent-green: #00ff9d;
    --accent-yellow: #ffd700;
    --accent-red: #ff4d6d;
    --accent-purple: #a855f7;
    --text-main: #e2f0ff;
    --text-sub: #7a9ab8;
    --border: rgba(0,212,255,0.18);
    --glow-cyan: 0 0 20px rgba(0,212,255,0.35);
    --glow-green: 0 0 20px rgba(0,255,157,0.35);
    --radius: 16px;
    --font-main: 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background: var(--bg-deep);
    color: var(--text-main);
    font-family: var(--font-main);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }
  /* 배경 애니메이션 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 800px 600px at 20% 10%, rgba(0,100,200,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 600px 400px at 80% 80%, rgba(100,0,200,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 400px 300px at 50% 50%, rgba(0,200,150,0.04) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  /* 별 파티클 */
  .stars { position:fixed; inset:0; pointer-events:none; z-index:0; }
  .star {
    position:absolute; width:2px; height:2px; border-radius:50%;
    background:#fff; animation: twinkle var(--dur,3s) ease-in-out infinite;
    animation-delay: var(--delay,0s);
    opacity:0;
  }
  @keyframes twinkle { 0%,100%{opacity:0} 50%{opacity:var(--op,0.6)} }

  #app { position:relative; z-index:1; max-width:760px; margin:0 auto; padding:16px; }

  /* 헤더 */
  .game-header {
    text-align:center; padding:28px 16px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 20px;
  }
  .game-title {
    font-size: clamp(1.4rem, 5vw, 2rem);
    font-weight: 900;
    background: linear-gradient(135deg, var(--accent-cyan), var(--accent-green), var(--accent-yellow));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1.2; margin-bottom: 6px;
  }
  .game-subtitle { color: var(--text-sub); font-size:0.85rem; }
  .music-btn {
    position:fixed; top:12px; right:12px; z-index:100;
    background: rgba(0,212,255,0.12); border:1px solid var(--border);
    color: var(--accent-cyan); padding:8px 14px; border-radius:30px;
    cursor:pointer; font-size:0.8rem; font-family:var(--font-main);
    backdrop-filter:blur(10px);
    transition: all 0.3s;
  }
  .music-btn:hover { background: rgba(0,212,255,0.25); }

  /* 카드 공통 */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.5s ease both;
  }
  @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
  .card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background: linear-gradient(90deg, transparent, var(--accent-cyan), transparent);
    opacity:0.5;
  }

  /* 캐릭터 마스코트 */
  .mascot-wrap { text-align:center; margin-bottom:16px; }
  .mascot-svg { width:80px; height:80px; display:inline-block; transition: transform 0.3s; }
  .mascot-bubble {
    background: var(--bg-panel); border: 1px solid var(--border);
    border-radius:12px; padding:10px 16px;
    font-size:0.88rem; color:var(--text-main);
    position:relative; display:inline-block; max-width:90%;
    margin-top:8px; text-align:left; line-height:1.5;
  }
  .mascot-bubble::before {
    content:'▲'; color:var(--bg-panel); position:absolute;
    top:-12px; left:50%; transform:translateX(-50%);
    font-size:0.7rem;
    filter: drop-shadow(0 -1px 0 rgba(0,212,255,0.18));
  }
  .mascot-name {
    font-size:0.72rem; color:var(--accent-cyan);
    margin-bottom:4px; font-weight:700; letter-spacing:0.05em;
  }

  /* 미션 진행 바 */
  .mission-nav {
    display:flex; gap:8px; margin-bottom:20px;
    justify-content:center; flex-wrap:wrap;
  }
  .mission-dot {
    width:32px; height:32px; border-radius:50%;
    border: 2px solid var(--border);
    display:flex; align-items:center; justify-content:center;
    font-size:0.75rem; font-weight:700; color:var(--text-sub);
    transition: all 0.4s; cursor:default; user-select:none;
  }
  .mission-dot.active {
    border-color: var(--accent-cyan); color:var(--accent-cyan);
    box-shadow: var(--glow-cyan);
    background: rgba(0,212,255,0.08);
  }
  .mission-dot.done {
    border-color: var(--accent-green); color:var(--accent-green);
    background: rgba(0,255,157,0.08);
  }
  .mission-dot-label { font-size:0.68rem; color:var(--text-sub); text-align:center; margin-top:2px; }

  /* 점수 표시 */
  .score-bar {
    display:flex; justify-content:space-between; align-items:center;
    background:var(--bg-panel); border-radius:10px; padding:10px 16px;
    margin-bottom:16px; border:1px solid var(--border);
  }
  .score-item { text-align:center; }
  .score-label { font-size:0.68rem; color:var(--text-sub); margin-bottom:2px; }
  .score-val { font-size:1.1rem; font-weight:900; color:var(--accent-cyan); }

  /* 타이머 */
  .timer-wrap { text-align:center; margin-bottom:12px; }
  .timer-bar-bg { height:6px; background:rgba(255,255,255,0.08); border-radius:3px; overflow:hidden; }
  .timer-bar { height:100%; background:linear-gradient(90deg, var(--accent-cyan), var(--accent-green)); transition:width 0.1s linear; border-radius:3px; }
  .timer-val { font-size:1rem; font-weight:700; color:var(--accent-cyan); margin-bottom:6px; }
  .timer-val.danger { color:var(--accent-red); animation:blink 0.4s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* 질문 카드 */
  .question-area { margin-bottom:16px; }
  .question-badge {
    display:inline-block; font-size:0.7rem; font-weight:700;
    padding:3px 10px; border-radius:20px; margin-bottom:10px;
    letter-spacing:0.05em;
  }
  .badge-easy { background:rgba(0,255,157,0.15); color:var(--accent-green); border:1px solid rgba(0,255,157,0.3); }
  .badge-normal { background:rgba(0,212,255,0.15); color:var(--accent-cyan); border:1px solid rgba(0,212,255,0.3); }
  .badge-hard { background:rgba(255,77,109,0.15); color:var(--accent-red); border:1px solid rgba(255,77,109,0.3); }
  .question-text {
    font-size:clamp(0.95rem, 2.5vw, 1.08rem);
    line-height:1.7; color:var(--text-main); font-weight:500;
    margin-bottom:6px;
  }
  .question-data {
    background:rgba(0,212,255,0.05); border-left:3px solid var(--accent-cyan);
    border-radius:0 8px 8px 0; padding:10px 14px;
    font-size:0.85rem; color:var(--text-sub); margin-bottom:14px;
    line-height:1.6;
  }
  .question-data strong { color:var(--accent-cyan); }

  /* 선택지 버튼 */
  .choices { display:flex; flex-direction:column; gap:10px; }
  .choice-btn {
    background: var(--bg-panel);
    border: 1.5px solid var(--border);
    border-radius:12px; padding:14px 18px;
    color:var(--text-main); font-size:0.9rem; font-family:var(--font-main);
    text-align:left; cursor:pointer; transition:all 0.25s;
    min-height:52px; line-height:1.4;
  }
  .choice-btn:hover:not(:disabled) {
    border-color:var(--accent-cyan); background:rgba(0,212,255,0.08);
    transform:translateX(4px);
  }
  .choice-btn.correct { border-color:var(--accent-green); background:rgba(0,255,157,0.12); color:var(--accent-green); }
  .choice-btn.wrong { border-color:var(--accent-red); background:rgba(255,77,109,0.1); color:var(--accent-red); }
  .choice-btn:disabled { cursor:default; }

  /* 힌트 버튼 */
  .hint-btn {
    background:rgba(255,215,0,0.08); border:1px solid rgba(255,215,0,0.25);
    color:var(--accent-yellow); border-radius:8px; padding:8px 16px;
    font-size:0.8rem; cursor:pointer; font-family:var(--font-main);
    transition:all 0.2s; margin-bottom:12px;
  }
  .hint-btn:hover:not(:disabled) { background:rgba(255,215,0,0.16); }
  .hint-btn:disabled { opacity:0.4; cursor:not-allowed; }
  .hint-box {
    background:rgba(255,215,0,0.06); border:1px solid rgba(255,215,0,0.2);
    border-radius:8px; padding:10px 14px; font-size:0.82rem;
    color:var(--accent-yellow); margin-bottom:12px; line-height:1.6;
    display:none;
  }

  /* 피드백 */
  .feedback-box {
    border-radius:12px; padding:14px 16px;
    margin-bottom:12px; line-height:1.6; font-size:0.88rem;
    display:none;
  }
  .feedback-box.correct { background:rgba(0,255,157,0.08); border:1px solid rgba(0,255,157,0.25); color:var(--accent-green); }
  .feedback-box.wrong { background:rgba(255,77,109,0.08); border:1px solid rgba(255,77,109,0.25); color:var(--text-main); }

  /* 스티커 팝업 */
  .sticker-popup {
    position:fixed; inset:0; z-index:200;
    display:flex; align-items:center; justify-content:center;
    pointer-events:none; opacity:0;
    transition: opacity 0.3s;
  }
  .sticker-popup.show { opacity:1; }
  .sticker-inner {
    background:var(--bg-card); border:2px solid var(--accent-green);
    border-radius:20px; padding:28px 36px; text-align:center;
    box-shadow: var(--glow-green), 0 20px 60px rgba(0,0,0,0.5);
    animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .sticker-inner.wrong-sticker { border-color:var(--accent-cyan); box-shadow:var(--glow-cyan), 0 20px 60px rgba(0,0,0,0.5); }
  @keyframes popIn { from{transform:scale(0.5)} to{transform:scale(1)} }
  .sticker-emoji { font-size:3.5rem; display:block; margin-bottom:8px; }
  .sticker-text { font-size:1.1rem; font-weight:700; color:var(--text-main); }

  /* 다음 버튼 */
  .next-btn {
    width:100%; padding:16px; border-radius:12px;
    background:linear-gradient(135deg, var(--accent-cyan), rgba(0,212,255,0.7));
    border:none; color:#000; font-size:1rem; font-weight:700;
    font-family:var(--font-main); cursor:pointer;
    transition: all 0.3s; display:none;
    box-shadow: var(--glow-cyan);
  }
  .next-btn:hover { transform:translateY(-2px); box-shadow: 0 0 30px rgba(0,212,255,0.5); }
  .next-btn.show { display:block; animation:fadeIn 0.4s ease; }

  /* 미션3 AI 체험 */
  .ai-mission { }
  .data-cards { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:16px; }
  .data-card {
    background:var(--bg-panel); border:1.5px solid var(--border);
    border-radius:12px; padding:12px; text-align:center; cursor:pointer;
    transition:all 0.25s; user-select:none;
    min-height:70px; display:flex; flex-direction:column;
    justify-content:center; align-items:center; gap:4px;
  }
  .data-card:hover { border-color:var(--accent-purple); background:rgba(168,85,247,0.08); }
  .data-card.selected-a { border-color:var(--accent-cyan); background:rgba(0,212,255,0.12); }
  .data-card.selected-b { border-color:var(--accent-yellow); background:rgba(255,215,0,0.1); }
  .data-card.classified-correct { border-color:var(--accent-green); background:rgba(0,255,157,0.12); }
  .data-card.classified-wrong { border-color:var(--accent-red); background:rgba(255,77,109,0.1); }
  .data-card-icon { font-size:1.8rem; }
  .data-card-text { font-size:0.78rem; color:var(--text-sub); }

  .classify-labels { display:flex; gap:10px; margin-bottom:12px; }
  .classify-label {
    flex:1; padding:10px; border-radius:10px; text-align:center;
    font-size:0.82rem; font-weight:700; cursor:pointer;
    transition:all 0.2s; border:2px solid;
  }
  .label-a { border-color:var(--accent-cyan); color:var(--accent-cyan); background:rgba(0,212,255,0.06); }
  .label-a.active-label { background:rgba(0,212,255,0.2); }
  .label-b { border-color:var(--accent-yellow); color:var(--accent-yellow); background:rgba(255,215,0,0.06); }
  .label-b.active-label { background:rgba(255,215,0,0.18); }

  /* 미션4 시나리오 */
  .scenario-box {
    background:rgba(0,212,255,0.04); border:1px solid var(--border);
    border-radius:12px; padding:16px; margin-bottom:16px;
    font-size:0.9rem; line-height:1.7; color:var(--text-main);
  }
  .scenario-box .scene-title {
    color:var(--accent-cyan); font-weight:700; font-size:0.8rem;
    text-transform:uppercase; letter-spacing:0.08em;
    margin-bottom:8px;
  }

  /* 결과 화면 */
  .result-section { text-align:center; }
  .result-grade-badge {
    display:inline-block; font-size:4rem; margin:16px 0;
    animation: floatAnim 3s ease-in-out infinite;
  }
  @keyframes floatAnim { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  .result-title {
    font-size:clamp(1.3rem, 4vw, 1.8rem); font-weight:900;
    background:linear-gradient(135deg, var(--accent-cyan), var(--accent-green));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    margin-bottom:8px;
  }
  .result-subtitle { color:var(--text-sub); font-size:0.88rem; margin-bottom:20px; }
  .result-career {
    background:var(--bg-panel); border:1px solid var(--border);
    border-radius:14px; padding:18px; margin-bottom:16px; text-align:left;
  }
  .result-career-title { color:var(--accent-yellow); font-weight:700; font-size:0.85rem; margin-bottom:8px; }
  .result-career-content { font-size:0.9rem; line-height:1.7; color:var(--text-main); }
  .score-breakdown {
    display:grid; grid-template-columns:repeat(4,1fr); gap:8px;
    margin-bottom:16px;
  }
  .score-cell { background:var(--bg-panel); border-radius:10px; padding:10px; text-align:center; }
  .score-cell-label { font-size:0.68rem; color:var(--text-sub); margin-bottom:4px; }
  .score-cell-val { font-size:1rem; font-weight:700; color:var(--accent-cyan); }

  /* 닉네임 & 리더보드 */
  .nickname-input {
    background:var(--bg-panel); border:1.5px solid var(--border);
    border-radius:10px; padding:12px 16px; color:var(--text-main);
    font-family:var(--font-main); font-size:0.95rem; width:100%;
    margin-bottom:10px;
  }
  .nickname-input:focus { outline:none; border-color:var(--accent-cyan); }
  .submit-score-btn {
    width:100%; padding:14px; border-radius:10px;
    background:rgba(0,212,255,0.1); border:1.5px solid var(--accent-cyan);
    color:var(--accent-cyan); font-size:0.95rem; font-weight:700;
    font-family:var(--font-main); cursor:pointer; transition:all 0.2s;
    margin-bottom:14px;
  }
  .submit-score-btn:hover { background:rgba(0,212,255,0.2); }

  .leaderboard { margin-bottom:16px; }
  .lb-title { font-size:0.8rem; color:var(--text-sub); margin-bottom:8px; font-weight:700; }
  .lb-row {
    display:flex; justify-content:space-between; align-items:center;
    padding:8px 12px; border-radius:8px; margin-bottom:4px;
    background:var(--bg-panel); font-size:0.85rem;
  }
  .lb-rank { color:var(--accent-yellow); font-weight:700; min-width:24px; }
  .lb-name { color:var(--text-main); flex:1; margin:0 10px; }
  .lb-score { color:var(--accent-cyan); font-weight:700; }

  /* QR */
  .qr-section { text-align:center; padding-top:10px; }
  .qr-label { font-size:0.75rem; color:var(--text-sub); margin-bottom:10px; }
  #qrcode { display:inline-block; background:#fff; padding:8px; border-radius:10px; }

  /* 뱃지 */
  .badge-row { display:flex; justify-content:center; gap:12px; margin-bottom:16px; flex-wrap:wrap; }
  .badge-item { text-align:center; }
  .badge-star { font-size:0.9rem; }
  .badge-label { font-size:0.65rem; color:var(--text-sub); }

  /* 시작 화면 */
  .start-screen { text-align:center; padding:20px 0; }
  .start-hero { font-size:5rem; margin-bottom:16px; display:block; animation: floatAnim 3s ease-in-out infinite; }
  .start-desc { font-size:0.9rem; color:var(--text-sub); line-height:1.8; margin-bottom:24px; max-width:520px; margin-left:auto; margin-right:auto; }
  .start-info-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:24px; max-width:520px; margin-left:auto; margin-right:auto; }
  .start-info-cell { background:var(--bg-panel); border-radius:10px; padding:12px; text-align:center; }
  .start-info-icon { font-size:1.5rem; margin-bottom:4px; }
  .start-info-text { font-size:0.75rem; color:var(--text-sub); }
  .start-btn {
    display:inline-block; padding:16px 48px; border-radius:50px;
    background:linear-gradient(135deg, var(--accent-cyan), var(--accent-green));
    border:none; color:#000; font-size:1.05rem; font-weight:900;
    font-family:var(--font-main); cursor:pointer; transition:all 0.3s;
    box-shadow: var(--glow-cyan);
  }
  .start-btn:hover { transform:scale(1.06); box-shadow:0 0 40px rgba(0,212,255,0.5); }
  .source-note { font-size:0.7rem; color:var(--text-sub); margin-top:8px; opacity:0.7; }

  /* 난이도 탭 */
  .diff-tabs { display:flex; gap:8px; margin-bottom:16px; }
  .diff-tab {
    flex:1; padding:10px; border-radius:10px; text-align:center;
    font-size:0.82rem; font-weight:700; cursor:pointer;
    border:1.5px solid var(--border); color:var(--text-sub);
    transition:all 0.2s; font-family:var(--font-main); background:transparent;
  }
  .diff-tab.active-easy { border-color:var(--accent-green); color:var(--accent-green); background:rgba(0,255,157,0.08); }
  .diff-tab.active-normal { border-color:var(--accent-cyan); color:var(--accent-cyan); background:rgba(0,212,255,0.08); }
  .diff-tab.active-hard { border-color:var(--accent-red); color:var(--accent-red); background:rgba(255,77,109,0.08); }

  /* 알고리즘 정렬 미션 */
  .algo-steps { display:flex; flex-direction:column; gap:8px; margin-bottom:16px; }
  .algo-step {
    background:var(--bg-panel); border:1.5px solid var(--border);
    border-radius:10px; padding:12px 16px; cursor:grab;
    display:flex; align-items:center; gap:10px;
    transition:all 0.2s; user-select:none;
  }
  .algo-step:hover { border-color:var(--accent-purple); }
  .algo-step.dragging { opacity:0.4; border-color:var(--accent-cyan); }
  .algo-step-num {
    width:26px; height:26px; border-radius:50%;
    background:rgba(0,212,255,0.15); color:var(--accent-cyan);
    font-size:0.8rem; font-weight:700; display:flex;
    align-items:center; justify-content:center; flex-shrink:0;
  }
  .algo-step-text { font-size:0.85rem; color:var(--text-main); line-height:1.4; }
  .algo-confirm-btn {
    width:100%; padding:13px; border-radius:10px;
    background:rgba(168,85,247,0.1); border:1.5px solid var(--accent-purple);
    color:var(--accent-purple); font-size:0.9rem; font-weight:700;
    font-family:var(--font-main); cursor:pointer; transition:all 0.2s;
  }
  .algo-confirm-btn:hover { background:rgba(168,85,247,0.2); }

  .section-title {
    font-size:0.75rem; color:var(--accent-cyan);
    text-transform:uppercase; letter-spacing:0.1em;
    font-weight:700; margin-bottom:12px;
    display:flex; align-items:center; gap:6px;
  }
  .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

  /* 미션 완료 배너 */
  .mission-clear {
    text-align:center; padding:20px;
    background:rgba(0,255,157,0.05); border:1px solid rgba(0,255,157,0.2);
    border-radius:14px; margin-bottom:16px;
  }

let audioCtx = null, musicPlaying = false, musicNodes = [];
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playNote(freq, start, dur, gain=0.08, type='sine') {
  const ctx = getAudioCtx();
  const osc = ctx.createOscillator();
  const gainNode = ctx.createGain();
  osc.connect(gainNode); gainNode.connect(ctx.destination);
  osc.type = type; osc.frequency.value = freq;
  gainNode.gain.setValueAtTime(0, ctx.currentTime + start);
  gainNode.gain.linearRampToValueAtTime(gain, ctx.currentTime + start + 0.05);
  gainNode.gain.linearRampToValueAtTime(0, ctx.currentTime + start + dur - 0.05);
  osc.start(ctx.currentTime + start);
  osc.stop(ctx.currentTime + start + dur);
  musicNodes.push(osc);
  return osc;
}
let musicInterval = null;
function startMusic() {
  const scale = [261.63,293.66,329.63,349.23,392,440,493.88,523.25];
  const pattern = [0,2,4,7,4,2,0,5,7,9,7,5,4,2,7,4];
  let beat = 0;
  function playBeat() {
    if (!musicPlaying) return;
    const note = scale[pattern[beat % pattern.length]];
    playNote(note, 0, 0.45, 0.07, 'triangle');
    if (beat % 4 === 0) playNote(note/2, 0, 0.8, 0.04, 'sine');
    beat++;
  }
  musicInterval = setInterval(playBeat, 550);
  playBeat();
}
function stopMusic() {
  if (musicInterval) clearInterval(musicInterval);
  musicNodes.forEach(n => { try { n.stop(); } catch(e){} });
  musicNodes = [];
}
function toggleMusic() {
  const btn = document.getElementById('musicBtn');
  if (musicPlaying) { musicPlaying = false; stopMusic(); btn.textContent = '🔇 음악 OFF'; }
  else { musicPlaying = true; getAudioCtx().resume(); startMusic(); btn.textContent = '🎵 음악 ON'; }
}
function playSfx(type) {

    }

}

function showSticker(correct, msg='') {
  const popup = document.getElementById('stickerPopup');
  const inner = document.getElementById('stickerInner');
  const emoji = document.getElementById('stickerEmoji');
  const text = document.getElementById('stickerText');
  if (correct) {
    emoji.textContent = ['🎉','⭐','🌟','✨','💫'][Math.floor(Math.random()*5)];
    text.textContent = msg || '정답이에요!';
    inner.className = 'sticker-inner';
  } else {
    emoji.textContent = ['💙','🤔','💪','🌈','👍'][Math.floor(Math.random()*5)];
    text.textContent = msg || '좋은 시도야! 이런 생각도 있어:';
    inner.className = 'sticker-inner wrong-sticker';
  }
  popup.className = 'sticker-popup show';
  setTimeout(() => { popup.className = 'sticker-popup'; }, 1800);
}

function calcBadge(pts, max) {
  if (pts >= max * 0.8) return 3;
  if (pts >= max * 0.5) return 2;
  if (pts > 0) return 1;
  return 0;
}

function getEndingGrade() {
  const total = state.scores.reduce((a,b)=>a+b,0);
  if (total >= 80) return 'S';
  if (total >= 60) return 'A';
  if (total >= 40) return 'B';
  return 'C';
}

let m1Timer, m1TimeLeft, m1Answered, m1Score, m1QIdx;

function showMission1() {
  state.screen = 'mission1';
  m1TimeLeft = 60; m1Answered = 0; m1Score = 0; m1QIdx = 0;
  const news = mission1News[0];
  render(`${missionNav()}${scoreBar()}<div class="card">
    <div class="section-title">🎯 미션 1 — 뉴스 읽기 탐색</div>
    ${mascot('normal','뉴스 기사를 읽고 핵심 정보를 찾아보세요! 총 60초 안에 3문제를 풀어야 해요. 비판적으로 읽는 것이 중요해요! 📰')}
    <div class="timer-wrap">
      <div class="timer-val" id="m1timer">⏱ 60초</div>
      <div class="timer-bar-bg"><div class="timer-bar" id="m1timerBar" style="width:100%"></div></div>
    </div>
    <div class="question-data" style="margin-bottom:14px;white-space:pre-line">${news.body}</div>
    <div id="m1QuestionArea"></div>
  </div>`);
  renderM1Question();
  m1Timer = setInterval(()=>{
    m1TimeLeft--;
    const el = document.getElementById('m1timer');
    const bar = document.getElementById('m1timerBar');
    if (el) { el.textContent = `⏱ ${m1TimeLeft}초`; el.className = m1TimeLeft<=10?'timer-val danger':'timer-val'; }
    if (bar) bar.style.width = (m1TimeLeft/60*100)+'%';
    if (m1TimeLeft <= 0) { clearInterval(m1Timer); endMission1(); }
  }, 1000);
}

function renderM1Question() {
  const news = mission1News[0];
  if (m1QIdx >= news.questions.length) { clearInterval(m1Timer); endMission1(); return; }
  const q = news.questions[m1QIdx];
  const area = document.getElementById('m1QuestionArea');
  if (!area) return;
  area.innerHTML = `<div class="question-area">
    <span class="question-badge badge-easy">📰 뉴스 읽기 (${m1QIdx+1}/${news.questions.length})</span>
    <div class="question-text">${q.text}</div>
    <div class="choices">${q.options.map((o,i)=>`<button class="choice-btn" onclick="answerM1(${i})">${o}</button>`).join('')}</div>
  </div>`;
}

function answerM1(idx) {
  const q = mission1News[0].questions[m1QIdx];
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b=>b.disabled=true);
  const correct = idx === q.answer;
  btns[idx].className = 'choice-btn ' + (correct?'correct':'wrong');
  if (correct) { m1Score += 10; showSticker(true); playSfx('correct'); }
  else { btns[q.answer].className = 'choice-btn correct'; showSticker(false,'좋은 시도야! 기사를 다시 읽어보면 힌트가 있어요 📖'); playSfx('wrong'); }
  m1QIdx++;
  setTimeout(()=>renderM1Question(), 1400);
}

function endMission1() {
  clearInterval(m1Timer);
  state.scores[0] = m1Score;
  state.badges[0] = calcBadge(m1Score, 30);
  playSfx('clear');
  const area = document.getElementById('m1QuestionArea');
  if (area) area.innerHTML = `<div class="mission-clear">
    <div class="mission-clear-title">✅ 미션1 완료!</div>
    <div class="mission-clear-pts">획득 점수: ${m1Score}점 / 30점 | 뱃지: ${'★'.repeat(state.badges[0])}${'☆'.repeat(3-state.badges[0])}</div>
    ${mascot(m1Score>=20?'happy':'think', m1Score>=20?'뉴스 읽기 완벽해요! 비판적 매체 읽기 능력이 훌륭합니다. 미션2로 GO! 🚀':'괜찮아요! 기사에서 숫자와 키워드에 집중하면 더 잘 할 수 있어요. 다음 미션도 파이팅! 💪')}
    <button class="next-btn show" onclick="showMission2()">➡️ 미션2 교과 융합 퀴즈로</button>
  </div>`;
  const timer = document.getElementById('m1timer');
  if (timer) timer.textContent = '⏱ 종료';
}

      <div class="timer-wrap">
        <div class="timer-val" id="m2timerEl">⏱ ${timeLimit}초</div>
        <div class="timer-bar-bg"><div class="timer-bar" id="m2timerBar" style="width:100%"></div></div>
      </div>
      <div class="question-text">${q.q}</div>
      <button class="hint-btn" id="m2hintBtn" onclick="showM2Hint()" ${hintUsed?'disabled':''}>
        💡 힌트 보기 ${hintUsed?'(사용됨)':'(배점 30% 차감)'}
      </button>
      <div class="hint-box" id="m2hintBox">${q.hint}</div>
      <div class="choices">${q.opts.map((o,i)=>`<button class="choice-btn" onclick="answerM2(${i})">${o}</button>`).join('')}</div>
      <div class="feedback-box" id="m2feedback"></div>
    </div>`;
  startM2Timer(timeLimit, qIdx);
}

function startM2Timer(limit, qIdx) {
  m2Timer = setInterval(()=>{
    m2TimeLeft--;
    const el = document.getElementById('m2timerEl');
    const bar = document.getElementById('m2timerBar');
    if (el) { el.textContent = `⏱ ${m2TimeLeft}초`; el.className = m2TimeLeft<=10?'timer-val danger':'timer-val'; }
    if (bar) bar.style.width = (m2TimeLeft/limit*100)+'%';
    if (m2TimeLeft <= 0) {
      clearInterval(m2Timer);
      const qs = mission2Questions[state.m2Difficulty];
      const q = qs[qIdx];
      autoWrongM2(q, qIdx);
    }
  }, 1000);
}

function showM2Hint() {
  state.hintsUsed[state.m2QuestionIdx] = true;
  const btn = document.getElementById('m2hintBtn');
  const box = document.getElementById('m2hintBox');
  if (btn) { btn.disabled = true; btn.textContent = '💡 힌트 보기 (사용됨)'; }
  if (box) box.style.display = 'block';
}

function answerM2(idx) {
  clearInterval(m2Timer);
  const qs = mission2Questions[state.m2Difficulty];
  const q = qs[state.m2QuestionIdx];
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b=>b.disabled=true);
  const pts = state.m2Difficulty==='easy'?10:state.m2Difficulty==='normal'?15:20;
  const correct = idx === q.ans;
  btns[idx].className = 'choice-btn ' + (correct?'correct':'wrong');
  const fb = document.getElementById('m2feedback');
  if (correct) {
    const earned = state.hintsUsed[state.m2QuestionIdx] ? Math.round(pts*0.7) : pts;
    state.scores[1] += earned;
    if (fb) { fb.className='feedback-box correct'; fb.style.display='block'; fb.innerHTML = `✅ 정답! +${earned}점 | 📚 ${q.exp}`; }
    showSticker(true, `정답! +${earned}점 🎉`);
    playSfx('correct');
  } else {
    btns[q.ans].className = 'choice-btn correct';
    if (fb) { fb.className='feedback-box wrong'; fb.style.display='block'; fb.innerHTML = `💙 좋은 시도야! 이런 생각도 있어:<br>📚 ${q.exp}`; }
    showSticker(false);
    playSfx('wrong');
  }
  state.m2QuestionIdx++;
  const nextBtn = document.createElement('button');
  nextBtn.className = 'next-btn show';
  nextBtn.textContent = state.m2QuestionIdx >= qs.length ? '✅ 미션2 완료' : '➡️ 다음 문제';
  nextBtn.onclick = () => { if (state.m2QuestionIdx >= qs.length) endMission2(); else renderM2Question(); };
  if (fb) fb.parentElement.appendChild(nextBtn);
}

function autoWrongM2(q, qIdx) {
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b=>b.disabled=true);
  if (btns[q.ans]) btns[q.ans].className = 'choice-btn correct';
  const fb = document.getElementById('m2feedback');
  if (fb) { fb.className='feedback-box wrong'; fb.style.display='block'; fb.innerHTML = `⏰ 시간 초과! 정답은 "${q.opts[q.ans]}"<br>📚 ${q.exp}`; }
  state.m2QuestionIdx++;
  const nextBtn = document.createElement('button');
  nextBtn.className = 'next-btn show';
  nextBtn.textContent = state.m2QuestionIdx >= mission2Questions[state.m2Difficulty].length ? '✅ 미션2 완료' : '➡️ 다음 문제';
  nextBtn.onclick = () => { if (state.m2QuestionIdx >= mission2Questions[state.m2Difficulty].length) endMission2(); else renderM2Question(); };
  if (fb) fb.parentElement.appendChild(nextBtn);
}

function endMission2() {
  clearInterval(m2Timer);
  state.badges[1] = calcBadge(state.scores[1], state.m2Difficulty==='easy'?30:state.m2Difficulty==='normal'?45:60);
  playSfx('clear');
  const maxPts = state.m2Difficulty==='easy'?30:state.m2Difficulty==='normal'?45:60;
  render(`${missionNav()}${scoreBar()}<div class="card">
    <div class="mission-clear">
      <div class="mission-clear-title">✅ 미션2 완료!</div>
      <div class="mission-clear-pts">획득 점수: ${state.scores[1]}점 / ${maxPts}점 | 뱃지: ${'★'.repeat(state.badges[1])}${'☆'.repeat(3-state.badges[1])}</div>
    </div>
    ${mascot(state.scores[1]>maxPts*0.6?'happy':'think', state.scores[1]>maxPts*0.6?'교과 융합 지식이 훌륭해요! 다음은 AI 직접 체험 미션이에요. 가장 재미있는 미션이 기다리고 있어요! 🤖':'이번엔 아쉬웠지만, 경험이 쌓이고 있어요! AI 체험 미션에서 만회해 보세요! 💪')}
    <button class="next-btn show" onclick="showMission3()">➡️ 미션3 AI 체험으로</button>
  </div>`);
}

// ═══ 미션3: AI 체험 ═══
let m3ClassifyCount, m3AlgoOrder, m3AlgoPhase;

function showMission3() {
  state.screen = 'mission3';
  state.m3Phase = 0;
  state.m3Correct = 0;
  m3ClassifyCount = 0;
  renderMission3Classify();
}

function renderMission3Classify() {
  const dm = mission3Data;
  render(`${missionNav()}${scoreBar()}<div class="card">
    <div class="section-title">🎯 미션 3 — AI 체험: 데이터 분류</div>
    ${mascot('normal','AI는 데이터를 분류하며 학습해요! 각 직업 관련 데이터를 올바른 카테고리로 분류해 보세요. 2050년에도 살아남을 직업은 어떤 것일까요? 🤖')}
    <div class="question-text" style="margin-bottom:12px">${dm.intro}</div>
    <div class="classify-labels">
      <div class="classify-label label-a" id="labelA">${dm.labelA}</div>
      <div class="classify-label label-b" id="labelB">${dm.labelB}</div>
    </div>
    <div class="data-cards" id="dataCards">
      ${dm.cards.map((c,i)=>`<div class="data-card" id="dc${i}" onclick="classifyCard(${i})">
        <div class="data-card-icon">${c.icon}</div>
        <div class="data-card-text">${c.text}</div>
      </div>`).join('')}
    </div>
    <div id="m3feedback" style="margin-top:12px;"></div>
    <div class="source-note">※ 분류 기준: 창의·판단·사회적 상호작용이 필요한 업무 vs 반복·예측 가능한 단순 업무 (한국고용정보원, 2025)</div>
  </div>`);
  let selectedIdx = null;
  let selectedLabel = null;
  window.classifyCard = function(idx) {
    if (document.getElementById('dc'+idx).classList.contains('classified-correct') ||
        document.getElementById('dc'+idx).classList.contains('classified-wrong')) return;
    if (selectedIdx === idx) { document.getElementById('dc'+idx).className = 'data-card'; selectedIdx = null; return; }
    if (selectedLabel === null) { alert('먼저 위 카테고리 중 하나를 선택한 후 데이터 카드를 클릭하세요!'); return; }
    const card = mission3Data.cards[idx];
    const correct = (selectedLabel === 'A' && card.answer === 'A') || (selectedLabel === 'B' && card.answer === 'B');
    document.getElementById('dc'+idx).className = 'data-card ' + (correct?'classified-correct':'classified-wrong');
    m3ClassifyCount++;
    if (correct) { state.m3Correct = (state.m3Correct||0) + 1; playSfx('correct'); }
    else playSfx('wrong');
    if (m3ClassifyCount >= mission3Data.cards.length) {
      setTimeout(()=>{
        const score = Math.round((state.m3Correct / mission3Data.cards.length) * 20);
        const fb = document.getElementById('m3feedback');
        if (fb) fb.innerHTML = `<div class="mission-clear" style="margin-top:10px">
          <div class="mission-clear-title">📊 분류 완료! ${state.m3Correct}/${mission3Data.cards.length} 정답</div>
          <button class="next-btn show" onclick="renderMission3Algo()" style="margin-top:12px">➡️ 알고리즘 순서 맞추기</button>
        </div>`;
      }, 500);
    }
  };
  document.querySelectorAll('.classify-label').forEach(el=>{
    el.addEventListener('click', function() {
      document.querySelectorAll('.classify-label').forEach(e=>e.classList.remove('active-label'));
      this.classList.add('active-label');
      selectedLabel = this.id === 'labelA' ? 'A' : 'B';
    });
  });
}

function renderMission3Algo() {
  const algo = algoMission;
  const shuffled = [...algo.steps].sort(()=>Math.random()-0.5);
  state.algoOrder = shuffled.map((s,i)=>i);
  state.algoSubmitted = false;
  let currentOrder = shuffled.map((s,i)=>i);
  let selected = null;

  render(`${missionNav()}${scoreBar()}<div class="card">
    <div class="section-title">🎯 미션 3 — AI 체험: 알고리즘 순서 맞추기</div>
    ${mascot('think','머신러닝 모델이 학습하는 단계를 올바른 순서로 맞춰보세요! 두 개를 탭하면 위치가 바뀌어요. ⚙️')}
    <div class="question-text" style="margin-bottom:12px">${algo.desc}</div>
    <div class="algo-steps" id="algoSteps">
      ${shuffled.map((step,i)=>`<div class="algo-step" id="astep${i}" onclick="selectAlgoStep(${i})">
        <div class="algo-step-num">${i+1}</div>
        <div class="algo-step-text">${step.text}</div>
      </div>`).join('')}
    </div>
    <button class="algo-confirm-btn" onclick="submitAlgo()">⚡ 순서 확인하기</button>
    <div id="algoFeedback" style="margin-top:12px"></div>
    <div class="source-note">※ 머신러닝 학습 5단계: 데이터수집 → 전처리 → 모델훈련 → 평가 → 배포 (정보 교과 AI 단원, 2022 개정 교육과정)</div>
  </div>`);

  window.selectAlgoStep = function(idx) {
    if (state.algoSubmitted) return;
    const stepEl = document.getElementById('astep'+idx);
    if (selected === null) {
      selected = idx; stepEl.style.borderColor = 'var(--accent-cyan)'; stepEl.style.background = 'rgba(0,212,255,0.12)';
    } else if (selected === idx) {
      selected = null; stepEl.style.borderColor=''; stepEl.style.background='';
    } else {
      // swap
      const stepsEl = document.getElementById('algoSteps');
      const steps = Array.from(stepsEl.children);
      const a = steps[selected], b = steps[idx];
      const tempA = a.innerHTML, tempB = b.innerHTML;
      a.innerHTML = tempB; b.innerHTML = tempA;
      a.style.borderColor=''; a.style.background='';
      b.style.borderColor=''; b.style.background='';
      // reassign click
      a.onclick = ()=>selectAlgoStep(selected);
      b.onclick = ()=>selectAlgoStep(idx);
      // rebuild step number
      Array.from(stepsEl.children).forEach((el,i)=>{
        el.querySelector('.algo-step-num').textContent = i+1;
        el.id = 'astep'+i;
        el.onclick = (()=>{const x=i;return()=>selectAlgoStep(x);})();
      });
      selected = null;
    }
  };

  window.submitAlgo = function() {
    if (state.algoSubmitted) return;
    state.algoSubmitted = true;
    const stepsEl = document.getElementById('algoSteps');
    const currentTexts = Array.from(stepsEl.children).map(el=>el.querySelector('.algo-step-text').textContent.trim());
    const correctTexts = algo.steps.sort((a,b)=>a.correctIdx-b.correctIdx).map(s=>s.text.trim());
    let correctCount = 0;
    currentTexts.forEach((t,i)=>{ if(t===correctTexts[i]) correctCount++; });
    const algoScore = Math.round((correctCount/algo.steps.length)*20);
    const classifyScore = Math.round(((state.m3Correct||0)/mission3Data.cards.length)*20);
    state.scores[2] = Math.min(40, classifyScore + algoScore);
    state.badges[2] = calcBadge(state.scores[2], 40);
    playSfx(correctCount>=4?'correct':'wrong');
    const fb = document.getElementById('algoFeedback');
    if (fb) fb.innerHTML = `<div class="mission-clear">
      <div class="mission-clear-title">${correctCount>=4?'✅ 훌륭해요!':'💙 좋은 시도!'} 알고리즘 ${correctCount}/${algo.steps.length} 정답</div>
      <div class="mission-clear-pts">미션3 총점: ${state.scores[2]}점 / 40점</div>
      <div style="margin:10px 0;font-size:0.8rem;color:var(--text-sub)">정답 순서: ① 데이터 수집 → ② 데이터 전처리 → ③ 모델 훈련 → ④ 평가·개선 → ⑤ 배포</div>
      ${mascot(correctCount>=4?'happy':'think', correctCount>=4?'알고리즘 이해 완벽해요! 머신러닝의 흐름을 잘 알고 있어요. 마지막 미션으로! 🚀':'괜찮아요! 머신러닝의 핵심은 데이터 수집 → 전처리 → 훈련 → 평가 → 배포예요. 다음 미션 파이팅! 💪')}
      <button class="next-btn show" onclick="showMission4()">➡️ 미션4 진로 판단으로</button>
    </div>`;
  };
}

// ═══ 미션4: 진로 판단 시나리오 ═══

function renderMission4(sceneIdx) {

    <div class="section-title">🎯 미션 4 — 진로 판단: 시나리오 선택</div>
    ${mascot('think','이 미션은 타이머가 없어요! 천천히 생각하고 가장 바람직한 선택을 해주세요. 정답보다 깊이 생각하는 것이 더 중요해요 💭')}
    <div class="scenario-box">

  </div>`);
}

function chooseM4(val, sceneIdx) {
  const sc = mission4Scenarios[sceneIdx];
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b=>b.disabled=true);
  const best = val === sc.best;
  if (best) { playSfx('correct'); showSticker(true,'최선의 선택이에요! 🌟'); }
  else { playSfx('wrong'); showSticker(false); }
  const fb = document.getElementById('m4feedback');
  if (fb) {
    fb.innerHTML = `<div class="feedback-box ${best?'correct':'wrong'}" style="display:block">
      ${sc.feedback[val]}
    </div>
    <button class="next-btn show" onclick="renderMission4(${sceneIdx+1})" style="margin-top:10px">
      ${sceneIdx+1 < mission4Scenarios.length ? '➡️ 다음 시나리오' : '🏁 결과 확인'}
    </button>`;
  }
  if (best) state.scores[3] += 20;
}

function endMission4() {
  state.badges[3] = calcBadge(state.scores[3], 40);
  playSfx('clear');
  showResult();
}

// ═══ 리더보드 ═══
const LB_KEY = 'milab_m1_018_lb';
function loadLeaderboard() {
  const lb = JSON.parse(localStorage.getItem(LB_KEY)||'[]');
  const el = document.getElementById('leaderboard');
  if (!el || lb.length === 0) { if(el) el.innerHTML=''; return; }
  const sorted = lb.sort((a,b)=>b.score-a.score).slice(0,5);
  el.innerHTML = `<div class="lb-title">🏆 명예의 전당 TOP 5</div>
    ${sorted.map((r,i)=>`<div class="lb-row">
      <div class="lb-rank">${['🥇','🥈','🥉','4️⃣','5️⃣'][i]}</div>
      <div class="lb-name">${r.name}</div>
      <div class="lb-score">${r.score}pt</div>
    </div>`).join('')}`;
}
function submitScore() {
  const name = document.getElementById('nicknameInput').value.trim();
  if (!name) { alert('닉네임을 입력해주세요!'); return; }
  const total = state.scores.reduce((a,b)=>a+b,0);
  const lb = JSON.parse(localStorage.getItem(LB_KEY)||'[]');
  lb.push({ name, score: total, grade: getEndingGrade() });
  localStorage.setItem(LB_KEY, JSON.stringify(lb));
  loadLeaderboard();
  document.getElementById('nicknameInput').disabled = true;
  document.querySelector('.submit-score-btn').disabled = true;
  document.querySelector('.submit-score-btn').textContent = '✅ 등록 완료!';
}
