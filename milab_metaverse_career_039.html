<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메타버스 진로체험 | MILAB #039</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
:root {
  --bg: #0d0d1a;
  --bg2: #13132b;
  --card: #1a1a35;
  --card2: #22224a;
  --accent: #7c5cfc;
  --accent2: #a78bfa;
  --cyan: #22d3ee;
  --green: #4ade80;
  --red: #f87171;
  --yellow: #fbbf24;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --border: rgba(124,92,252,0.3);
  --glow: 0 0 20px rgba(124,92,252,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── BACKGROUND PARTICLES ── */
#bg-canvas {
  position: fixed; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none; z-index: 0;
  opacity: 0.4;
}

/* ── MUSIC TOGGLE ── */
#music-btn {
  position: fixed; top: 14px; right: 14px;
  z-index: 999;
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--accent2);
  border-radius: 50%;
  width: 42px; height: 42px;
  font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .3s;
}
#music-btn:hover { background: var(--accent); color: #fff; }

/* ── SCREENS ── */
.screen {
  position: relative; z-index: 1;
  display: none;
  min-height: 100vh;
  padding: 20px 16px;
  max-width: 860px;
  margin: 0 auto;
  flex-direction: column;
  align-items: center;
}
.screen.active { display: flex; }

/* ── INTRO SCREEN ── */
#intro-screen {
  justify-content: center;
  text-align: center;
  gap: 18px;
}
.logo-badge {
  background: linear-gradient(135deg, var(--accent), var(--cyan));
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  padding: 4px 14px;
  border-radius: 20px;
  display: inline-block;
}
.intro-title {
  font-size: clamp(26px, 6vw, 42px);
  font-weight: 900;
  line-height: 1.2;
  background: linear-gradient(135deg, #fff, var(--accent2), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.intro-subtitle {
  font-size: 15px;
  color: var(--text2);
  line-height: 1.6;
  max-width: 480px;
}
.meta-mascot {
  width: 120px; height: 120px;
  margin: 0 auto;
}
.input-row {
  display: flex; gap: 10px;
  width: 100%; max-width: 400px;
}
.input-row input {
  flex: 1;
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 15px;
  outline: none;
}
.input-row input:focus { border-color: var(--accent); }
.diff-selector {
  display: flex; gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
  width: 100%;
}
.diff-btn {
  padding: 10px 22px;
  border-radius: 12px;
  border: 2px solid var(--border);
  background: var(--card);
  color: var(--text2);
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  transition: all .3s;
}
.diff-btn.active, .diff-btn:hover {
  border-color: var(--accent);
  background: rgba(124,92,252,0.2);
  color: var(--accent2);
}
.btn-primary {
  background: linear-gradient(135deg, var(--accent), #5b3fd4);
  color: #fff;
  border: none;
  padding: 14px 36px;
  border-radius: 14px;
  font-size: 16px; font-weight: 700;
  cursor: pointer;
  transition: all .3s;
  box-shadow: var(--glow);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(124,92,252,0.6); }
.btn-secondary {
  background: var(--card2);
  color: var(--text2);
  border: 1px solid var(--border);
  padding: 10px 24px;
  border-radius: 12px;
  font-size: 14px; cursor: pointer;
  transition: all .3s;
}
.btn-secondary:hover { border-color: var(--accent2); color: var(--accent2); }

/* ── QR ── */
.qr-wrap {
  text-align: center;
  margin-top: 10px;
}
.qr-wrap p { font-size: 11px; color: var(--text2); margin-top: 6px; }
#intro-qr, #result-qr {
  display: inline-block;
  background: #fff;
  padding: 8px;
  border-radius: 8px;
}

/* ── MISSION HUD ── */
#game-screen { gap: 0; }
.hud {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0 14px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 14px;
  flex-wrap: wrap;
  gap: 8px;
}
.hud-left { display: flex; align-items: center; gap: 10px; }
.hud-mission {
  background: linear-gradient(135deg, var(--accent), var(--cyan));
  color: #fff;
  font-size: 12px; font-weight: 700;
  padding: 4px 12px;
  border-radius: 20px;
}
.hud-title { font-size: 14px; font-weight: 700; color: var(--accent2); }
.hud-right { display: flex; gap: 14px; align-items: center; }
.hud-score {
  font-size: 13px; font-weight: 700;
  background: var(--card2);
  padding: 4px 12px;
  border-radius: 20px;
  color: var(--yellow);
}
.hud-timer {
  font-size: 20px; font-weight: 900;
  color: var(--cyan);
  min-width: 50px;
  text-align: center;
  font-family: monospace;
}
.hud-timer.warn { color: var(--red); animation: blink .5s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* PROGRESS BAR */
.progress-wrap {
  width: 100%;
  height: 6px;
  background: var(--card2);
  border-radius: 3px;
  margin-bottom: 16px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--cyan));
  border-radius: 3px;
  transition: width .4s;
}

/* ── MASCOT AREA ── */
.mascot-area {
  display: flex;
  align-items: flex-end;
  gap: 12px;
  width: 100%;
  margin-bottom: 14px;
}
.mascot-bubble {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 14px 14px 14px 0;
  padding: 10px 14px;
  font-size: 13px;
  color: var(--text2);
  line-height: 1.5;
  flex: 1;
  position: relative;
}
.mascot-bubble::before {
  content: '';
  position: absolute;
  left: -8px; bottom: 12px;
  border: 4px solid transparent;
  border-right-color: var(--border);
}

/* ── QUESTION CARD ── */
.question-card {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 14px;
}
.q-tag {
  display: inline-block;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 10px;
  margin-bottom: 10px;
}
.q-tag.easy { background: rgba(74,222,128,.2); color: var(--green); }
.q-tag.normal { background: rgba(251,191,36,.2); color: var(--yellow); }
.q-tag.hard { background: rgba(248,113,113,.2); color: var(--red); }
.q-tag.scenario { background: rgba(34,211,238,.2); color: var(--cyan); }
.q-tag.data { background: rgba(167,139,250,.2); color: var(--accent2); }
.q-text {
  font-size: 16px;
  font-weight: 700;
  line-height: 1.6;
  margin-bottom: 6px;
}
.q-source {
  font-size: 11px;
  color: var(--text2);
  margin-bottom: 14px;
}
.q-source a { color: var(--accent2); text-decoration: none; }
.choices {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.choice-btn {
  width: 100%;
  background: var(--card2);
  border: 2px solid var(--border);
  color: var(--text);
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  text-align: left;
  cursor: pointer;
  transition: all .25s;
  line-height: 1.4;
}
.choice-btn:hover:not(:disabled) {
  border-color: var(--accent);
  background: rgba(124,92,252,0.15);
}
.choice-btn.correct {
  border-color: var(--green);
  background: rgba(74,222,128,0.15);
  color: var(--green);
}
.choice-btn.wrong {
  border-color: var(--red);
  background: rgba(248,113,113,0.15);
  color: var(--red);
}
.choice-btn:disabled { cursor: default; }

/* FACT CHECK BTNS (Mission 1) */
.fact-btns {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 10px;
}
.fact-btn {
  flex: 1;
  max-width: 160px;
  padding: 16px 12px;
  border-radius: 14px;
  border: 2px solid var(--border);
  background: var(--card2);
  color: var(--text);
  font-size: 16px; font-weight: 800;
  cursor: pointer;
  transition: all .25s;
  display: flex; flex-direction: column;
  align-items: center; gap: 6px;
}
.fact-btn:hover:not(:disabled) { transform: scale(1.04); }
.fact-btn.real-btn:hover:not(:disabled) { border-color: var(--green); background: rgba(74,222,128,0.15); }
.fact-btn.fake-btn:hover:not(:disabled) { border-color: var(--red); background: rgba(248,113,113,0.15); }
.fact-btn.correct { border-color: var(--green); background: rgba(74,222,128,0.2); }
.fact-btn.wrong { border-color: var(--red); background: rgba(248,113,113,0.2); }
.fact-badge {
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 6px;
  letter-spacing: 1px;
}
.real-badge { background: var(--green); color: #000; }
.fake-badge { background: var(--red); color: #fff; }

/* FEEDBACK BOX */
.feedback-box {
  width: 100%;
  border-radius: 12px;
  padding: 14px 16px;
  font-size: 13px;
  line-height: 1.6;
  margin-bottom: 14px;
  border: 1px solid;
  display: none;
}
.feedback-box.correct-fb {
  background: rgba(74,222,128,0.1);
  border-color: var(--green);
  color: var(--green);
  display: block;
}
.feedback-box.wrong-fb {
  background: rgba(248,113,113,0.1);
  border-color: var(--red);
  color: var(--red);
  display: block;
}
.fb-subject {
  display: inline-block;
  background: rgba(167,139,250,0.2);
  color: var(--accent2);
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 6px;
  margin-top: 6px;
}

/* HINT BTN */
.hint-row {
  display: flex;
  justify-content: flex-end;
  margin-bottom: 10px;
}
.hint-btn {
  background: rgba(251,191,36,0.15);
  border: 1px solid var(--yellow);
  color: var(--yellow);
  padding: 6px 14px;
  border-radius: 10px;
  font-size: 12px;
  cursor: pointer;
  transition: all .25s;
}
.hint-btn:hover { background: rgba(251,191,36,0.3); }
.hint-btn:disabled { opacity: .4; cursor: default; }
.hint-box {
  background: rgba(251,191,36,0.08);
  border: 1px solid rgba(251,191,36,0.3);
  border-radius: 10px;
  padding: 10px 14px;
  font-size: 12px;
  color: var(--yellow);
  margin-bottom: 10px;
  display: none;
}

/* MISSION 3 - SCENARIO */
.scenario-card {
  width: 100%;
  background: linear-gradient(135deg, rgba(34,211,238,0.08), rgba(124,92,252,0.08));
  border: 1px solid rgba(34,211,238,0.3);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 14px;
}
.scenario-label {
  font-size: 11px;
  font-weight: 700;
  color: var(--cyan);
  letter-spacing: 1px;
  margin-bottom: 8px;
}
.scenario-text {
  font-size: 14px;
  line-height: 1.7;
  color: var(--text);
  margin-bottom: 10px;
}
.ai-warning {
  font-size: 11px;
  color: var(--text2);
  border-top: 1px solid var(--border);
  padding-top: 8px;
  margin-top: 8px;
}

/* MISSION 4 - DATA */
.chart-wrap {
  width: 100%;
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 14px;
}
.chart-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--cyan);
  margin-bottom: 12px;
}
.bar-chart { width: 100%; }
.bar-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.bar-label {
  width: 110px;
  font-size: 12px;
  color: var(--text2);
  text-align: right;
  flex-shrink: 0;
}
.bar-track {
  flex: 1;
  background: var(--card);
  border-radius: 4px;
  height: 22px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  border-radius: 4px;
  display: flex;
  align-items: center;
  padding-left: 6px;
  font-size: 11px;
  font-weight: 700;
  color: #fff;
  transition: width 1s;
}

/* NAVIGATION */
.nav-row {
  display: flex;
  gap: 10px;
  width: 100%;
  justify-content: center;
  padding-top: 6px;
}

/* MISSION INTRO */
.mission-intro {
  width: 100%;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 28px 20px;
  text-align: center;
  margin: 20px 0;
}
.mi-icon { font-size: 48px; margin-bottom: 12px; }
.mi-title { font-size: 22px; font-weight: 900; color: var(--accent2); margin-bottom: 8px; }
.mi-desc { font-size: 14px; color: var(--text2); line-height: 1.7; margin-bottom: 18px; }
.mi-rules {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 18px;
}
.mi-rule {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 12px;
  color: var(--text2);
}

/* RESULT SCREEN */
#result-screen { text-align: center; gap: 16px; }
.result-grade {
  font-size: clamp(40px, 10vw, 70px);
  font-weight: 900;
  background: linear-gradient(135deg, var(--accent2), var(--cyan));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.result-title { font-size: 20px; font-weight: 800; }
.result-desc { font-size: 14px; color: var(--text2); line-height: 1.7; max-width: 460px; }
.result-career {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 20px;
  width: 100%;
  max-width: 480px;
  text-align: left;
}
.rc-title { font-size: 12px; color: var(--text2); margin-bottom: 8px; font-weight: 700; letter-spacing: 1px; }
.rc-items { display: flex; flex-wrap: wrap; gap: 8px; }
.rc-item {
  background: rgba(124,92,252,0.2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 12px;
  font-size: 12px;
  color: var(--accent2);
  font-weight: 600;
}
.score-breakdown {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 20px;
  width: 100%;
  max-width: 480px;
}
.sb-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 13px;
}
.sb-row:last-child { border-bottom: none; font-weight: 700; color: var(--yellow); }

/* LEADERBOARD */
.leaderboard {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px 20px;
  width: 100%;
  max-width: 480px;
  text-align: left;
}
.lb-title { font-size: 12px; color: var(--text2); font-weight: 700; letter-spacing: 1px; margin-bottom: 10px; }
.lb-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 6px 0;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  font-size: 13px;
}
.lb-rank { width: 24px; text-align: center; font-weight: 700; }
.lb-name { flex: 1; padding: 0 10px; }
.lb-score { color: var(--yellow); font-weight: 700; }

/* STICKER ANIMATION */
.sticker-pop {
  position: fixed;
  top: 40%;
  left: 50%;
  transform: translate(-50%,-50%) scale(0);
  font-size: 60px;
  z-index: 9999;
  pointer-events: none;
  transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .5s;
}
.sticker-pop.show { transform: translate(-50%,-50%) scale(1); }
.sticker-pop.hide { opacity: 0; }

/* RESPONSIVE */
@media(max-width:480px){
  .fact-btns { flex-direction: column; align-items: center; }
  .fact-btn { max-width: 100%; width: 100%; flex-direction: row; }
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<button id="music-btn" onclick="toggleMusic()" title="음악 ON/OFF">🎵</button>
<div class="sticker-pop" id="sticker"></div>

<!-- ════════════════════════════════
     INTRO SCREEN
════════════════════════════════ -->
<div class="screen active" id="intro-screen">
  <div class="logo-badge">MILAB · 중학교 공통 · #039</div>

  <!-- Mascot SVG -->
  <svg class="meta-mascot" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="mg1" cx="50%" cy="50%" r="50%">
        <stop offset="0%" stop-color="#a78bfa"/>
        <stop offset="100%" stop-color="#7c5cfc"/>
      </radialGradient>
    </defs>
    <!-- body -->
    <ellipse cx="60" cy="80" rx="28" ry="22" fill="#22224a"/>
    <rect x="36" y="70" width="48" height="28" rx="10" fill="#22224a"/>
    <!-- jacket -->
    <path d="M40 76 Q60 82 80 76 L82 98 Q60 105 38 98 Z" fill="url(#mg1)" opacity=".8"/>
    <!-- tie -->
    <polygon points="60,80 64,88 60,95 56,88" fill="#22d3ee"/>
    <!-- head -->
    <ellipse cx="60" cy="50" rx="24" ry="26" fill="#ffe0b2"/>
    <!-- hair -->
    <ellipse cx="60" cy="26" rx="22" ry="12" fill="#5b4fcf"/>
    <rect x="38" y="20" width="44" height="16" rx="10" fill="#5b4fcf"/>
    <!-- eyes -->
    <ellipse cx="50" cy="48" rx="5" ry="6" fill="#1a1a35"/>
    <ellipse cx="70" cy="48" rx="5" ry="6" fill="#1a1a35"/>
    <ellipse cx="51.5" cy="46.5" rx="2" ry="2.5" fill="#fff"/>
    <ellipse cx="71.5" cy="46.5" rx="2" ry="2.5" fill="#fff"/>
    <!-- VR glasses -->
    <rect x="38" y="44" width="44" height="12" rx="6" fill="#7c5cfc" opacity=".7"/>
    <rect x="40" y="45" width="17" height="9" rx="4" fill="#22d3ee" opacity=".6"/>
    <rect x="63" y="45" width="17" height="9" rx="4" fill="#22d3ee" opacity=".6"/>
    <!-- smile -->
    <path d="M52 62 Q60 68 68 62" stroke="#c97b2f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- mic -->
    <rect x="82" y="58" width="6" height="14" rx="3" fill="#94a3b8"/>
    <ellipse cx="85" cy="58" rx="5" ry="7" fill="#e2e8f0"/>
    <line x1="85" y1="72" x2="85" y2="80" stroke="#94a3b8" stroke-width="2"/>
    <line x1="81" y1="80" x2="89" y2="80" stroke="#94a3b8" stroke-width="2"/>
  </svg>

  <div class="intro-title">메타버스 진로 설계사</div>
  <div class="intro-subtitle">
    2030년, 진로체험은 메타버스로! 팩트체크·AI윤리·데이터 분석을 거쳐<br>
    나만의 미래 커리어 로드맵을 완성하세요. 🌐
  </div>

  <div class="qr-wrap">
    <div id="intro-qr"></div>
    <p>📱 QR로 바로 시작하기</p>
  </div>

  <div class="input-row">
    <input type="text" id="nickname-input" placeholder="닉네임 입력 (예: 진로탐험가)" maxlength="10"/>
  </div>

  <div style="font-size:13px;color:var(--text2)">난이도 선택</div>
  <div class="diff-selector">

const GAME_URL = 'https://milab2019.github.io/main/milab_metaverse_career_039.html';
let state = {
  nickname: '',
  difficulty: 'easy',
  mission: 0,        // 0=intro, 1~4=missions

// ══════════════════════════════════════════
//  WEB AUDIO
// ══════════════════════════════════════════
let audioCtx = null, musicOn = true, bgGain = null, bgOsc1 = null, bgOsc2 = null;
function initAudio(){
  if(audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    bgGain = audioCtx.createGain();
    bgGain.gain.value = 0.06;
    bgGain.connect(audioCtx.destination);
    startBGM();
  } catch(e){}
}
function startBGM(){
  if(!audioCtx) return;
  [bgOsc1, bgOsc2].forEach(o => { try{ if(o){o.stop();} }catch(e){} });
  const o1 = audioCtx.createOscillator();
  const o2 = audioCtx.createOscillator();
  o1.type = 'sine'; o1.frequency.value = 110;
  o2.type = 'triangle'; o2.frequency.value = 165;
  o1.connect(bgGain); o2.connect(bgGain);
  o1.start(); o2.start();
  bgOsc1 = o1; bgOsc2 = o2;
  // Pulse
  if(bgGain){
    const lfo = audioCtx.createOscillator();
    const lfoG = audioCtx.createGain();
    lfo.frequency.value = 0.4;
    lfoG.gain.value = 0.03;
    lfo.connect(lfoG); lfoG.connect(bgGain.gain);
    lfo.start();
  }
}
function stopBGM(){
  [bgOsc1, bgOsc2].forEach(o => { try{ if(o) o.stop(); }catch(e){} });
}
function toggleMusic(){
  if(!audioCtx) initAudio();
  musicOn = !musicOn;
  document.getElementById('music-btn').textContent = musicOn ? '🎵' : '🔇';
  if(musicOn){ startBGM(); if(bgGain) bgGain.gain.value = 0.06; }
  else { stopBGM(); }
}
function playSFX(type){
  if(!audioCtx || !musicOn) return;
  const g = audioCtx.createGain();
  g.connect(audioCtx.destination);
  const o = audioCtx.createOscillator();
  o.connect(g);
  if(type==='correct'){ o.frequency.value=523; g.gain.value=0.15; o.type='sine';
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.4); o.start(); o.stop(audioCtx.currentTime+0.4); }
  else if(type==='wrong'){ o.frequency.value=200; g.gain.value=0.1; o.type='sawtooth';
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.3); o.start(); o.stop(audioCtx.currentTime+0.3); }
  else if(type==='tick'){ o.frequency.value=880; g.gain.value=0.05; o.type='sine';
    g.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.05); o.start(); o.stop(audioCtx.currentTime+0.05); }
  else if(type==='fanfare'){
    [523,659,784,1047].forEach((f,i)=>{
      const oo=audioCtx.createOscillator(), gg=audioCtx.createGain();
      oo.connect(gg); gg.connect(audioCtx.destination);
      oo.frequency.value=f; gg.gain.value=0.1; oo.type='sine';
      gg.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.15+i*0.12);
      oo.start(audioCtx.currentTime+i*0.12);
      oo.stop(audioCtx.currentTime+0.3+i*0.12);
    });
  }
}

// ══════════════════════════════════════════
//  BACKGROUND CANVAS
// ══════════════════════════════════════════
(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  let W, H, particles=[];
  function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
  function mkP(){ return { x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.5+0.5,
    vx:(Math.random()-.5)*0.4, vy:(Math.random()-.5)*0.4,
    color:`hsla(${Math.random()*60+220},70%,70%,${Math.random()*.5+.2})` }; }
  resize(); for(let i=0;i<80;i++) particles.push(mkP());
  window.addEventListener('resize', resize);
  function loop(){
    ctx.clearRect(0,0,W,H);
    particles.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>W) p.vx*=-1;
      if(p.y<0||p.y>H) p.vy*=-1;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=p.color; ctx.fill();
    });
    // Draw lines
    particles.forEach((p,i)=>{
      particles.slice(i+1).forEach(q=>{
        const d=Math.hypot(p.x-q.x,p.y-q.y);
        if(d<100){ ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y);
          ctx.strokeStyle=`rgba(124,92,252,${0.15*(1-d/100)})`; ctx.stroke(); }
      });
    });
    requestAnimationFrame(loop);
  }
  loop();
})();

    new QRCode(el, { text: GAME_URL, width: 80, height: 80,
      colorDark:'#1a1a35', colorLight:'#ffffff', correctLevel: QRCode.CorrectLevel.M });
    el.querySelector('img') && (el.querySelector('img').style.display='none');
  } catch(e){}
}

const DIFF_MULT = { easy:1.0, normal:1.3, hard:1.6 };
const DIFF_LABEL = { easy:'쉬움', normal:'보통', hard:'도전' };

// ══════════════════════════════════════════
//  SCREEN NAV
// ══════════════════════════════════════════
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function goIntro(){ showScreen('intro-screen'); }

function showLeaderboard(){
  const lb = document.getElementById('intro-lb');
  lb.style.display = lb.style.display==='none' ? 'block' : 'none';
  renderLB('intro-lb-list');
}

function renderLB(id){
  const data = JSON.parse(localStorage.getItem('milab039_lb') || '[]');
  const el = document.getElementById(id);
  if(!data.length){ el.innerHTML='<div style="color:var(--text2);font-size:13px;text-align:center;padding:10px">아직 기록이 없습니다</div>'; return; }
  el.innerHTML = data.slice(0,5).map((r,i)=>
    `<div class="lb-row">
      <span class="lb-rank">${['🥇','🥈','🥉','4','5'][i]}</span>
      <span class="lb-name">${r.name}</span>
      <span style="font-size:11px;color:var(--text2);margin-right:8px">${r.diff}</span>
      <span class="lb-score">${r.score}점</span>
    </div>`
  ).join('');
}

function saveLB(){
  const data = JSON.parse(localStorage.getItem('milab039_lb') || '[]');
  data.push({ name: state.nickname, score: state.score, diff: DIFF_LABEL[state.difficulty], date: new Date().toLocaleDateString() });
  data.sort((a,b) => b.score-a.score);
  localStorage.setItem('milab039_lb', JSON.stringify(data.slice(0,10)));
}

// ══════════════════════════════════════════
//  MISSION 1 - FACT CHECK
// ══════════════════════════════════════════
let m1Timer = 150, m1Done = false;
function startM1(){
  m1Timer = 150; m1Done = false;
  state.qIdx = 0;
  document.getElementById('hud-timer').style.display='block';
  startTimer(150, ()=>{ m1Done=true; endM1(); });
  showM1Question();
}

function showM1Question(){
  if(m1Done) return;
  const qs = QUESTIONS.m1;
  const idx = state.qIdx;
  if(idx >= qs.length){ m1Done=true; stopTimer(); endM1(); return; }
  const q = qs[idx];
  updateProgress(idx, qs.length);
  mascotSay('neutral', `뉴스 ${idx+1}/${qs.length}: 이 뉴스가 진짜일까요, 가짜일까요?`);

  document.getElementById('content-area').innerHTML = `
    <div class="question-card">
      <div class="q-tag normal">📰 팩트체크 ${idx+1}/${qs.length}</div>
      <div class="q-text">${q.text}</div>
      <div class="q-source">${q.source || ''}</div>
      <div class="fact-btns">
        <button class="fact-btn real-btn" onclick="answerFact(true, this)">
          ✅ <span class="fact-badge real-badge">REAL</span> 진짜 뉴스
        </button>
        <button class="fact-btn fake-btn" onclick="answerFact(false, this)">
          ❌ <span class="fact-badge fake-badge">FAKE</span> 가짜 뉴스
        </button>
      </div>
    </div>
    <div class="feedback-box" id="fb-box"></div>
    <div class="nav-row" id="nav-row" style="display:none">
      <button class="btn-primary" onclick="nextM1()">다음 뉴스 ▶</button>
    </div>
  `;
}

function answerFact(userAns, btn){
  if(document.querySelector('.fact-btn:disabled')) return;
  document.querySelectorAll('.fact-btn').forEach(b => b.disabled=true);
  const q = QUESTIONS.m1[state.qIdx];
  const correct = (userAns === q.answer);
  btn.classList.add(correct ? 'correct' : 'wrong');
  if(!correct){
    const other = document.querySelector(userAns ? '.fake-btn' : '.real-btn');
    if(other) other.classList.add('correct');
  }
  const pts = correct ? Math.round(10 * DIFF_MULT[state.difficulty]) : 0;
  state.score += pts; state.missionScores[0] += pts;
  document.getElementById('hud-score').textContent = state.score + '점';
  const fb = document.getElementById('fb-box');
  fb.className = 'feedback-box ' + (correct ? 'correct-fb' : 'wrong-fb');
  fb.innerHTML = q.fb + (correct ? `<br><strong>+${pts}점</strong>` : '<br>😅 이 시각도 고민해볼 만해! 하지만 다시 보면:');
  document.getElementById('nav-row').style.display='flex';
  mascotSay(correct ? 'happy' : 'sad', correct ? '정확해! 뛰어난 팩트체크 능력이야! 🎉' : '아쉽지만 괜찮아! 이 근거를 보면 이해될 거야 💪');
  playSFX(correct ? 'correct' : 'wrong');
  showSticker(correct ? '🎯' : '💡');
}

function nextM1(){
  state.qIdx++;
  if(state.qIdx >= QUESTIONS.m1.length){ m1Done=true; stopTimer(); endM1(); }
  else showM1Question();
}

function endM1(){
  stopTimer();
  document.getElementById('hud-timer').style.display='none';
  mascotSay('happy', `미션1 완료! ${state.missionScores[0]}점 획득! 다음은 교과 융합 퀴즈야! 📚`);
  document.getElementById('content-area').innerHTML = `
    <div class="mission-intro">
      <div class="mi-icon">📰✅</div>
      <div class="mi-title">팩트체크 완료!</div>
      <div class="mi-desc">획득 점수: <strong style="color:var(--yellow)">${state.missionScores[0]}점</strong><br>총 ${state.qIdx}개 뉴스 분석 완료</div>
      <button class="btn-primary" onclick="showMissionIntro(2)">미션 2로 이동 ▶</button>
    </div>
  `;
}

// ══════════════════════════════════════════
//  MISSION 2 - QUIZ
// ══════════════════════════════════════════
let m2Questions = [];
function startM2(){
  const d = state.difficulty;
  const byDiff = QUESTIONS.m2;
  m2Questions = [
    ...byDiff.easy.slice(0,3),
    ...byDiff.normal.slice(0,3),
    ...byDiff.hard.slice(0,3),
  ];
  state.qIdx = 0;
  showM2Question();
}

function showM2Question(){
  const qs = m2Questions;
  const idx = state.qIdx;
  if(idx >= qs.length){ endM2(); return; }
  const q = qs[idx];
  updateProgress(idx, qs.length);
  const tagClass = idx<3?'easy':idx<6?'normal':'hard';
  const tagLabel = idx<3?'🌱 기초':idx<6?'🔥 심화':'⚡ 고급';
  state.hintUsedQ = false;

  document.getElementById('hud-timer').style.display='block';
  startTimer(45, ()=>{ forceNextM2(); });
  mascotSay('neutral', `문제 ${idx+1}/${qs.length}: 깊이 생각해보자! 힌트는 1회 사용 가능해.`);

  document.getElementById('content-area').innerHTML = `
    <div class="hint-row">
      <button class="hint-btn" id="hint-btn" onclick="showHint2()">💡 힌트 (-30%)</button>
    </div>
    <div class="hint-box" id="hint-box">💡 ${q.hint}</div>
    <div class="question-card">
      <div class="q-tag ${tagClass}">${tagLabel} · 문제 ${idx+1}</div>
      <div class="q-text">${q.text}</div>
      <div class="choices">
        ${q.choices.map((c,i)=>`<button class="choice-btn" onclick="answerM2(${i}, this)">${String.fromCharCode(9312+i)} ${c}</button>`).join('')}
      </div>
    </div>
    <div class="feedback-box" id="fb-box"></div>
    <div class="nav-row" id="nav-row" style="display:none">
      <button class="btn-primary" onclick="nextM2()">다음 문제 ▶</button>
    </div>
  `;
}

function showHint2(){
  const btn = document.getElementById('hint-btn');
  if(state.hintUsedQ) return;
  state.hintUsedQ = true;
  state.hintsUsed++;
  btn.disabled = true;
  btn.textContent = '💡 힌트 사용됨';
  document.getElementById('hint-box').style.display='block';
}

function answerM2(i, btn){
  if(document.querySelector('.choice-btn:disabled')) return;
  stopTimer();
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled=true);
  const q = m2Questions[state.qIdx];
  const correct = (i === q.answer);
  document.querySelectorAll('.choice-btn')[q.answer].classList.add('correct');
  if(!correct) btn.classList.add('wrong');
  let pts = correct ? Math.round((state.hintUsedQ ? 7 : 10) * DIFF_MULT[state.difficulty]) : 0;
  state.score += pts; state.missionScores[1] += pts;
  document.getElementById('hud-score').textContent = state.score + '점';
  const fb = document.getElementById('fb-box');
  fb.className = 'feedback-box ' + (correct ? 'correct-fb' : 'wrong-fb');
  fb.innerHTML = (correct ? '✅ 정답! ' : '❌ 이 시각도 설득력 있어! 하지만 이 근거를 보면: ') + q.fb +
    (correct ? `<br><strong>+${pts}점</strong>` : '') +
    `<br><span class="fb-subject">📌 ${q.subject}</span>`;
  document.getElementById('nav-row').style.display='flex';
  mascotSay(correct ? 'happy' : 'sad', correct ? '완벽해! 교과 지식이 빛나는군! ✨' : '아쉽지만 이 개념, 고교 선택과목에서 더 깊이 배울 수 있어!');
  playSFX(correct ? 'correct' : 'wrong');
  showSticker(correct ? '⭐' : '📖');
}

function forceNextM2(){
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled=true);
  const q = m2Questions[state.qIdx];
  document.querySelectorAll('.choice-btn')[q.answer].classList.add('correct');
  const fb = document.getElementById('fb-box');
  fb.className = 'feedback-box wrong-fb';
  fb.innerHTML = '⏱ 시간 초과! ' + q.fb + `<br><span class="fb-subject">📌 ${q.subject}</span>`;
  document.getElementById('nav-row') && (document.getElementById('nav-row').style.display='flex');
  mascotSay('sad', '시간이 부족했어! 다음엔 조금 더 빠르게!');
}

function nextM2(){ state.qIdx++; showM2Question(); }

function endM2(){
  stopTimer();
  document.getElementById('hud-timer').style.display='none';
  mascotSay('happy', `미션2 완료! ${state.missionScores[1]}점 획득! 이제 AI 딜레마 시나리오야! 🤖`);
  document.getElementById('content-area').innerHTML = `
    <div class="mission-intro">
      <div class="mi-icon">📚✅</div>
      <div class="mi-title">교과 융합 퀴즈 완료!</div>
      <div class="mi-desc">획득 점수: <strong style="color:var(--yellow)">${state.missionScores[1]}점</strong></div>
      <button class="btn-primary" onclick="showMissionIntro(3)">미션 3으로 이동 ▶</button>
    </div>
  `;
}

// ══════════════════════════════════════════
//  MISSION 3 - SCENARIO
// ══════════════════════════════════════════
function startM3(){
  state.qIdx = 0;
  document.getElementById('hud-timer').style.display='none';
  showM3Question();
}

function showM3Question(){
  const qs = QUESTIONS.m3;
  const idx = state.qIdx;
  if(idx >= qs.length){ endM3(); return; }
  const q = qs[idx];
  updateProgress(idx, qs.length);
  mascotSay('neutral', `시나리오 ${idx+1}/${qs.length}: 정답이 없어! 최선의 판단을 내려봐. 🤔`);

  document.getElementById('content-area').innerHTML = `
    <div class="scenario-card">
      <div class="scenario-label">🌐 메타버스 딜레마 시나리오 ${idx+1}</div>
      <div class="scenario-text">${q.scenario}</div>
      ${q.aiWarn ? `<div class="ai-warning">⚠️ AI가 생성한 시나리오 요소가 포함되어 있을 수 있습니다. 정보는 비판적으로 검토하세요.</div>` : ''}
    </div>
    <div class="question-card">
      <div class="q-tag scenario">🤔 시나리오 판단</div>
      <div class="q-text">${q.question}</div>
      <div class="choices">
        ${q.choices.map((c,i)=>`<button class="choice-btn" onclick="answerM3(${i}, this)">${c}</button>`).join('')}
      </div>
    </div>
    <div class="feedback-box" id="fb-box"></div>
    <div class="nav-row" id="nav-row" style="display:none">
      <button class="btn-primary" onclick="nextM3()">다음 시나리오 ▶</button>
    </div>
  `;
}

function answerM3(i, btn){
  if(document.querySelector('.choice-btn:disabled')) return;
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled=true);
  const q = QUESTIONS.m3[state.qIdx];
  const best = (i === q.best);
  document.querySelectorAll('.choice-btn')[q.best].classList.add('correct');
  if(!best) btn.classList.add('wrong');
  const pts = best ? Math.round(15 * DIFF_MULT[state.difficulty]) : Math.round(5 * DIFF_MULT[state.difficulty]);
  state.score += pts; state.missionScores[2] += pts;
  document.getElementById('hud-score').textContent = state.score + '점';
  const fb = document.getElementById('fb-box');
  fb.className = 'feedback-box ' + (best ? 'correct-fb' : 'wrong-fb');
  fb.innerHTML = q.fb[i] + `<br><strong>+${pts}점</strong>`;
  document.getElementById('nav-row').style.display='flex';
  mascotSay(best ? 'happy' : 'neutral', best ? '최선의 판단! 정책 전문가 자질이 보여! 🌟' : '이 시각도 가치 있어! 하지만 최선을 찾아보자 💭');
  playSFX(best ? 'correct' : 'wrong');
  showSticker(best ? '🏛️' : '💭');
}

function nextM3(){ state.qIdx++; showM3Question(); }

function endM3(){
  mascotSay('happy', `미션3 완료! ${state.missionScores[2]}점 획득! 마지막, 데이터 분석이야! 📊`);
  document.getElementById('content-area').innerHTML = `
    <div class="mission-intro">
      <div class="mi-icon">🤖✅</div>
      <div class="mi-title">AI 딜레마 완료!</div>
      <div class="mi-desc">획득 점수: <strong style="color:var(--yellow)">${state.missionScores[2]}점</strong></div>
      <button class="btn-primary" onclick="showMissionIntro(4)">미션 4로 이동 ▶</button>
    </div>
  `;
}

// ══════════════════════════════════════════
//  MISSION 4 - DATA ANALYSIS
// ══════════════════════════════════════════
function startM4(){
  state.qIdx = 0;
  document.getElementById('hud-timer').style.display='none';
  showM4();
}

function showM4(){
  const qs = QUESTIONS.m4.questions;
  const idx = state.qIdx;
  if(idx >= qs.length){ endM4(); return; }
  const q = qs[idx];
  updateProgress(idx, qs.length);
  state.hintUsedQ = false;
  mascotSay('neutral', `데이터 ${idx+1}/${qs.length}: 그래프를 잘 읽어봐! 숫자 속에 미래가 있어 📊`);

  const chartHTML = `
    <div class="chart-wrap">
      <div class="chart-title">📊 2030년 메타버스 관련 직업 수요 증가율 예측 (%)<br>
        <span style="font-size:11px;color:var(--text2)">출처: 미랩 미래직업연구소 시뮬레이션 데이터 2024 · 실제 수치와 다를 수 있음</span>
      </div>
      <div class="bar-chart">
        ${QUESTIONS.m4.chartData.map(d=>`
          <div class="bar-row">
            <div class="bar-label">${d.label}</div>
            <div class="bar-track">
              <div class="bar-fill" style="width:${d.val}%;background:${d.color}">${d.val}%</div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;

  document.getElementById('content-area').innerHTML = chartHTML + `
    <div class="hint-row">
      <button class="hint-btn" id="hint-btn" onclick="showHint4()">💡 힌트 (-30%)</button>
    </div>
    <div class="hint-box" id="hint-box">💡 ${q.hint}</div>
    <div class="question-card">
      <div class="q-tag data">📊 데이터 분석 ${idx+1}</div>
      <div class="q-text">${q.text}</div>
      <div class="choices">
        ${q.choices.map((c,i)=>`<button class="choice-btn" onclick="answerM4(${i}, this)">${String.fromCharCode(9312+i)} ${c}</button>`).join('')}
      </div>
    </div>
    <div class="feedback-box" id="fb-box"></div>
    <div class="nav-row" id="nav-row" style="display:none">
      <button class="btn-primary" onclick="nextM4()">다음 ▶</button>
    </div>
  `;
}

function showHint4(){
  const btn = document.getElementById('hint-btn');
  if(state.hintUsedQ) return;
  state.hintUsedQ = true; state.hintsUsed++;
  btn.disabled=true; btn.textContent='💡 힌트 사용됨';
  document.getElementById('hint-box').style.display='block';
}

function answerM4(i, btn){
  if(document.querySelector('.choice-btn:disabled')) return;
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled=true);
  const q = QUESTIONS.m4.questions[state.qIdx];
  const correct = (i===q.answer);
  document.querySelectorAll('.choice-btn')[q.answer].classList.add('correct');
  if(!correct) btn.classList.add('wrong');
  const pts = correct ? Math.round((state.hintUsedQ?7:10) * DIFF_MULT[state.difficulty]) : 0;
  state.score += pts; state.missionScores[3] += pts;
  document.getElementById('hud-score').textContent = state.score+'점';
  const fb = document.getElementById('fb-box');
  fb.className = 'feedback-box '+(correct?'correct-fb':'wrong-fb');
  fb.innerHTML = (correct?'✅ ':'❌ ') + q.fb + (correct?`<br><strong>+${pts}점</strong>`:'');
  document.getElementById('nav-row').style.display='flex';
  mascotSay(correct?'happy':'sad', correct?'데이터 독해력이 탁월해! 📊 미래를 읽는 눈이 있어!':'아쉬워! 데이터 분석은 연습이 중요해. 다시 보자!');
  playSFX(correct?'correct':'wrong');
  showSticker(correct?'📈':'🔍');
}

function nextM4(){ state.qIdx++; showM4(); }

function endM4(){
  playSFX('fanfare');
  mascotSay('happy', '모든 미션 완료! 놀라운 탐구자야! 🎊 결과를 확인해보자!');
  setTimeout(()=>{ saveLB(); showResult(); }, 1200);
}

function getEnding(){
  const pct = Math.min(100, Math.round(state.score / getMaxScore() * 100));
  return ENDINGS.find(e => pct >= e.min && pct <= e.max) || ENDINGS[0];
}
function getMaxScore(){
  // M1: 12*10=120, M2: 9*10=90, M3: 5*15=75, M4: 5*10=50 → base 335
  return Math.round(335 * DIFF_MULT[state.difficulty]);
}

// ══════════════════════════════════════════
//  TIMER
// ══════════════════════════════════════════
function startTimer(sec, cb){
  stopTimer();
  state.timerVal = sec;
  const el = document.getElementById('hud-timer');
  el.textContent = sec;
  el.classList.remove('warn');
  state.timerInterval = setInterval(()=>{
    state.timerVal--;
    if(el) el.textContent = state.timerVal;
    if(state.timerVal <= 10){ el && el.classList.add('warn'); playSFX('tick'); }
    if(state.timerVal <= 0){ stopTimer(); cb && cb(); }
  }, 1000);
}
function stopTimer(){
  clearInterval(state.timerInterval);
  state.timerInterval = null;
}

// ══════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════
function updateProgress(idx, total){
  document.getElementById('progress-fill').style.width = (idx/total*100)+'%';
}

function mascotSay(emotion, text){
  document.getElementById('mascot-bubble').textContent = text;
  const mouth = document.getElementById('mascot-mouth');
  if(!mouth) return;
  if(emotion==='happy') mouth.setAttribute('d','M48 60 Q60 72 72 60');
  else if(emotion==='sad') mouth.setAttribute('d','M48 68 Q60 58 72 68');
  else mouth.setAttribute('d','M52 62 Q60 68 68 62');
}

function showSticker(emoji){
  const el = document.getElementById('sticker');
  el.textContent = emoji;
  el.classList.remove('show','hide');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(()=>{ el.classList.add('hide'); setTimeout(()=>el.classList.remove('show','hide'),500); },900);
}
